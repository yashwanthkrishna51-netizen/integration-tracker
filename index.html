    return;
  }

  // Delete integ
  if(act==='delete-integ'){
    if(!can('admin'))return;const c=S.clients.find(x=>x.id===d.cid);if(!c)return;
    const snap=JSON.stringify(c.integrations);const name=c.integrations.find(x=>x.id===d.iid)?.name||'integration';
    c.integrations=c.integrations.filter(x=>x.id!==d.iid);
    scheduleUndo(`Deleted: ${name}`,()=>{c.integrations=JSON.parse(snap);saveClients('Restore integration').then(()=>render());});
    saveClients(`Delete: ${name}`).then(()=>{navigate('client-detail',{clientId:c.id});}).catch(err=>{showToast(err.message,'error');c.integrations=JSON.parse(snap);render();});
    return;
  }

  // Delete client
  if(act==='delete-client'){
    if(!can('admin'))return;const c=S.clients.find(x=>x.id===d.id);if(!c)return;
    const snap=JSON.stringify(S.clients);
    S.clients=S.clients.filter(x=>x.id!==c.id);
    saveClients(`Delete client: ${c.name}`).then(()=>showToast(`Deleted: ${c.name}`,'warn')).catch(err=>{showToast(err.message,'error');S.clients=JSON.parse(snap);});
    render();return;
  }

  // Delete impl module
  if(act==='delete-impl-module'){
    if(!can('admin'))return;const c=S.clients.find(x=>x.id===d.cid);if(!c)return;
    const snap=JSON.stringify(c.modules);const name=c.modules?.find(x=>x.id===d.mid)?.name||'module';
    c.modules=c.modules?.filter(x=>x.id!==d.mid)||[];
    saveClients(`Delete module: ${name}`).then(()=>{showToast(`Deleted: ${name}`,'warn');render();}).catch(err=>{showToast(err.message,'error');c.modules=JSON.parse(snap);render();});

  }

  // Delete impl client
  if(act==='delete-impl-client'){
    if(!can('admin'))return;const c=S.clients.find(x=>x.id===d.id);if(!c)return;

    return;
  }

  // Bulk complete
  if(act==='bulk-mark-complete'){
    if(!can('admin')||!S.bulkSelected.size)return;
    const c=S.clients.find(x=>x.id===d.cid);if(!c)return;
    const today=todayStr();let count=0;
    S.bulkSelected.forEach(key=>{
      const[mid,phaseName]=key.split(':');const mod=c.modules?.find(x=>x.id===mid);if(!mod)return;
      let ph=mod.phases?.find(x=>x.name===phaseName);if(!ph){ph={id:uid(),name:phaseName,updates:[]};if(!mod.phases)mod.phases=[];mod.phases.push(ph);}
      ph.status='Completed';count++;
    });
    saveClients(`Bulk complete ${count} phases`).then(()=>{showToast(`${count} phase${count!==1?'s':''} marked complete ✓`);S.bulkImplMode=false;S.bulkImplCid=null;S.bulkSelected=new Set();render();}).catch(err=>showToast(err.message,'error'));
    return;
  }

  // Milestone buttons
  if(act==='add-milestone-btn'){S.modal={type:'add-milestone',cid:d.cid,iid:d.iid};render();return;}
  if(act==='edit-milestone-btn'){
    const c=S.clients.find(x=>x.id===d.cid);const i=c?.integrations.find(x=>x.id===d.iid);const ms=i?.milestones?.find(x=>x.id===d.mid);if(!ms)return;
    S.modal={type:'edit-milestone',cid:d.cid,iid:d.iid,mid:d.mid,msName:ms.name,msDue:ms.dueDate||'',msStatus:ms.status||'Pending',msOwner:ms.owner||'',msNotes:ms.notes||''};render();return;
  }
  if(act==='delete-milestone'){
    const c=S.clients.find(x=>x.id===d.cid);const i=c?.integrations.find(x=>x.id===d.iid);if(!i)return;
    i.milestones=(i.milestones||[]).filter(x=>x.id!==d.mid);
    saveClients('Delete milestone').then(()=>render()).catch(err=>showToast(err.message,'error'));
    return;
  }

  // Delete timeline entry
  if(act==='delete-timeline-entry'){
    if(!can('admin'))return;const c=S.clients.find(x=>x.id===d.cid);const i=c?.integrations.find(x=>x.id===d.iid);if(!i)return;
    i.timeline=(i.timeline||[]).filter(x=>x.id!==d.tid);
    saveClients('Delete update').then(()=>render()).catch(err=>showToast(err.message,'error'));return;
  }
  if(act==='delete-impl-update'){
    if(!can('admin'))return;const c=S.clients.find(x=>x.id===d.cid);const mod=c?.modules?.find(x=>x.id===d.mid);const ph=mod?.phases?.find(x=>x.name===d.phase);if(!ph)return;
    ph.updates=(ph.updates||[]).filter(x=>x.id!==d.tid);
    saveClients('Delete update').then(()=>render()).catch(err=>showToast(err.message,'error'));return;
  }

  // User management
  if(act==='edit-user'){
    const u=S.users.find(x=>x.id===d.uid);if(!u)return;
    S.modal={type:'edit-user',uid:u.id,username:u.username,uname:u.name,email:u.email||''};render();return;
  }
  if(act==='delete-user'){
    if(!can('admin'))return;const snap=JSON.stringify(S.users);
    S.users=S.users.filter(x=>x.id!==d.uid);
    saveUsers('Delete user').then(()=>render()).catch(err=>{showToast(err.message,'error');S.users=JSON.parse(snap);render();});
    return;
  }

  // Welcome email
  if(act==='send-welcome-all'){
    const targets=S.users.filter(u=>u.id!==S.user?.id&&u.email);
    if(!targets.length){showToast('No users with email addresses','error');return;}
    S.modal={type:'send-welcome',targets};render();return;
  }
  if(act==='send-welcome-one'){
    const u=S.users.find(x=>x.id===d.uid);if(!u)return;
    S.modal={type:'send-welcome',targets:[u]};render();return;
  }

  // Portfolio toggles
  if(act==='portfolio-client-toggle'||act==='portfolio-section-toggle')return;

  // Attach clear
  if(act==='clear-attach'){
    const pfx=d.prefix||'ip';
    const preview=document.getElementById(`${pfx}-attach-preview`);if(preview)preview.style.display='none';
    ['url','mimetype','filename'].forEach(k=>{const el=document.getElementById(`${pfx}-attach-${k}`);if(el)el.value='';});
    return;
  }
}

function handleChange(e){
  const t=e.target;const act=t.dataset?.act||t.id||'';

  // Search
  if(t.id==='search-inp'){S.search=t.value;render();return;}

  // AMS date range
  if(act==='ams-range'||t.id==='ams-from'||t.id==='ams-to'){
    if(t.id==='ams-from')S.amsFrom=t.value;
    else if(t.id==='ams-to')S.amsTo=t.value;
    S.amsQuick='';render();return;
  }

  // Change role
  if(t.dataset?.act==='change-role'){
    const u=S.users.find(x=>x.id===t.dataset.uid);if(!u||!can('admin'))return;
    const old=u.role;u.role=t.value;
    saveUsers(`Role: ${u.name} → ${t.value}`).then(()=>showToast(`Role updated: ${u.name}`)).catch(err=>{showToast(err.message,'error');u.role=old;render();});
    return;
  }

  // File attach on impl phase update
  if(t.id==='ip-attach-file'){
    const file=t.files?.[0];if(!file)return;
    const preview=document.getElementById('ip-attach-preview');
    const iconEl=document.getElementById('ip-attach-icon');
    const nameEl=document.getElementById('ip-attach-name');
    if(preview){preview.style.display='flex';}
    if(iconEl){const icons={pdf:'📄',xlsx:'📊',img:'🖼',file:'📎'};iconEl.textContent=icons[fileIcon('',file.type)]||'📎';}
    if(nameEl)nameEl.textContent=file.name;
    uploadAttachment(file).then(res=>{
      const url=document.getElementById('ip-attach-url');const mime=document.getElementById('ip-attach-mimetype');const fn=document.getElementById('ip-attach-filename');
      if(url)url.value=res.url||'';if(mime)mime.value=file.type;if(fn)fn.value=file.name;
      showToast('File attached ✓');
    }).catch(err=>{showToast(err.message,'error');if(preview)preview.style.display='none';});
    return;
  }
}

function handleKeydown(e){
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();S.cmdPaletteOpen=true;S.cmdQuery='';render();setTimeout(()=>document.getElementById('cmdp-input')?.focus(),50);return;}
  if(e.key==='Escape'){if(S.cmdPaletteOpen){S.cmdPaletteOpen=false;render();return;}if(S.modal){S.modal=null;render();}}
  if(e.key==='Enter'&&e.target.id==='lu')document.querySelector('[data-act="login"]')?.click();
  if(e.key==='Enter'&&e.target.id==='lp')document.querySelector('[data-act="login"]')?.click();
}

  const entry=ph.updates?.find(x=>x.id===tid);if(!entry)return;
  const inp=document.getElementById(`edit-tl-${tid}`);const text=(inp?.value||'').trim();if(!text)return;
  if(!entry.edits)entry.edits=[];entry.edits.push({text:entry.update,editedAt:new Date().toISOString()});entry.update=text;
  S.editingTimelineId=null;
  try{await saveClients('Edit impl update');render();}catch(err){showToast(err.message,'error');}
}

// Login
async function handleLogin(){
  const lu=document.getElementById('lu')?.value?.trim()||'';const lp=document.getElementById('lp')?.value||'';
  const btn=document.querySelector('[data-act="login"]');setBtnBusy(btn,'Signing in…');
  const lerr=document.getElementById('lerr');if(lerr)lerr.style.display='none';
  try{
    const r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:lu,password:lp})});
    const data=await r.json();
    if(!r.ok)throw new Error(data.message||data.error||`Auth failed (${r.status})`);
    S.user={id:data.user.id,username:data.user.username,name:data.user.name,role:data.user.role,email:data.user.email||''};
    S.sessionToken=data.token||lu;
    persistSession(S.sessionToken,S.user);
    // Load data
    startLoading();
    try{
      const[cl,ul]=await Promise.all([apiRead('data/clients.json'),apiRead('data/users.json').catch(()=>({content:[],sha:null}))]);
      S.clients=cl.content||[];S.shas.clients=cl.sha;
      S.users=ul.content||[];S.shas.users=ul.sha;
      S.usersForDropdown=[...S.users];
    }finally{stopLoading();}
    navigate('dashboard');
  }catch(err){
    if(lerr){lerr.textContent=err.message;lerr.style.display='block';}else showToast(err.message,'error');
  }finally{clearBtnBusy(btn);}
}

// Attach all listeners
document.addEventListener('click',e=>{
  // Close export dropdowns on outside click
  if(!e.target.closest('.export-menu-wrap')){document.querySelectorAll('.export-menu-wrap > div').forEach(el=>el.style.display='none');}
  // Login
  if(e.target.closest('[data-act="login"]')){handleLogin();return;}
  // Confirm modal
  if(e.target.closest('[data-act="modal-confirm"]')){handleModalConfirm();return;}
  // Add timeline
  const addTl=e.target.closest('[data-act="add-timeline"]');if(addTl){handleAddTimeline(addTl.dataset.cid,addTl.dataset.iid);return;}
  // Save edit timeline
  const saveTl=e.target.closest('[data-act="save-edit-timeline"]');if(saveTl){handleSaveEditTimeline(saveTl.dataset.cid,saveTl.dataset.iid,saveTl.dataset.tid);return;}
  // Save integ
  const svInteg=e.target.closest('[data-act="save-integ"]');if(svInteg){handleSaveInteg(svInteg.dataset.cid,svInteg.dataset.iid);return;}
  // Save impl phase
  const svPhase=e.target.closest('[data-act="save-impl-phase"]');if(svPhase){handleSaveImplPhase(svPhase.dataset.cid,svPhase.dataset.mid,svPhase.dataset.phase);return;}
  // Add impl update
  const addUpd=e.target.closest('[data-act="add-impl-update"]');if(addUpd){handleAddImplUpdate(addUpd.dataset.cid,addUpd.dataset.mid,addUpd.dataset.phase);return;}
  // Save edit impl update
  const svImplUpd=e.target.closest('[data-act="save-edit-impl-update"]');if(svImplUpd){handleSaveEditImplUpdate(svImplUpd.dataset.cid,svImplUpd.dataset.mid,svImplUpd.dataset.phase,svImplUpd.dataset.tid);return;}
  // Cmd palette input
  if(e.target.id==='cmdp-input')return;
  handleClick(e);
},true);
document.addEventListener('change',handleChange,true);
document.addEventListener('keydown',handleKeydown,true);
document.addEventListener('input',e=>{if(e.target.id==='cmdp-input'){S.cmdQuery=e.target.value;render();setTimeout(()=>{const el=document.getElementById('cmdp-input');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}},0);}},true);

// ─── INIT ─────────────────────────────────────────────────────────
async function init(){
  document.getElementById('app').innerHTML=renderAppSkeleton();
  const sess=restoreSession();
  if(!sess){render();return;}
  S.sessionToken=sess.token;S.user=sess.user;
  try{
    startLoading();
    const[cl,ul]=await Promise.all([
      apiRead('data/clients.json'),
      apiRead('data/users.json').catch(()=>({content:[],sha:null}))
    ]);
    S.clients=cl.content||[];S.shas.clients=cl.sha;
    S.users=ul.content||[];S.shas.users=ul.sha;
    S.usersForDropdown=[...S.users];
    navigate('dashboard');
  }catch(err){
    clearSession();S.user=null;S.sessionToken=null;
    showToast('Session expired — please sign in again','warn');
    render();
  }finally{stopLoading();}
}

init();
</script>
