<style>
/* ================================================================
   KORA — Enterprise Design System v3
   Based on UI/UX Pro Max: Enterprise SaaS · Trust & Authority
   Font: Plus Jakarta Sans · Palette: Slate + Teal
   WCAG AA · Reduced-motion safe
================================================================= */

:root {
  /* ── Brand ── */
  --teal-900: #0c4a6e; --teal-800: #075985; --teal-700: #0e7490;
  --teal-600: #0891b2; --teal-500: #06b6d4; --teal-400: #22d3ee;
  --teal-100: #cffafe; --teal-50: #ecfeff;

  /* ── Slate scale ── */
  --s-950: #020617; --s-900: #0f172a; --s-800: #1e293b;
  --s-700: #334155; --s-600: #475569; --s-500: #64748b;
  --s-400: #94a3b8; --s-300: #cbd5e1; --s-200: #e2e8f0;
  --s-100: #f1f5f9; --s-50:  #f8fafc;

  /* ── Semantic ── */
  --success:       #059669; --success-bg: #ecfdf5; --success-bd: #6ee7b7;
  --warning:       #d97706; --warning-bg: #fffbeb; --warning-bd: #fde68a;
  --danger:        #dc2626; --danger-bg:  #fef2f2; --danger-bd:  #fca5a5;
  --info:          #2563eb; --info-bg:    #eff6ff; --info-bd:    #bfdbfe;
  --violet:        #7c3aed; --violet-bg:  #f5f3ff; --violet-bd:  #c4b5fd;
  --orange:        #ea580c; --orange-bg:  #fff7ed; --orange-bd:  #fdba74;

  /* ── Aliases ── */
  --ink:    var(--s-900);
  --ink-2:  var(--s-700);
  --ink-3:  var(--s-500);
  --muted:  var(--s-400);
  --border: var(--s-200);
  --border-subtle: var(--s-100);
  --surface:var(--s-50);
  --paper:  #ffffff;
  --accent: var(--teal-700);

  /* ── Geometry ── */
  --r-xs: 4px; --r-sm: 6px; --r: 8px;
  --r-md: 10px; --r-lg: 12px; --r-xl: 16px; --r-2xl: 20px;
  --pill: 9999px;

  /* ── Shadows (teal-tinted per skill) ── */
  --sh-xs: 0 1px 2px rgba(14,116,144,.04);
  --sh-sm: 0 1px 3px rgba(14,116,144,.06),0 1px 2px rgba(14,116,144,.04);
  --sh:    0 4px 8px -2px rgba(14,116,144,.08),0 2px 4px -2px rgba(14,116,144,.04);
  --sh-md: 0 8px 16px -4px rgba(14,116,144,.1),0 4px 6px -4px rgba(14,116,144,.05);
  --sh-lg: 0 20px 32px -8px rgba(14,116,144,.14),0 8px 12px -4px rgba(14,116,144,.06);
  --sh-xl: 0 28px 48px -12px rgba(14,116,144,.2),0 0 0 1px rgba(14,116,144,.04);

  /* ── Motion (spring ease from skill) ── */
  --ease:  cubic-bezier(.16,1,.3,1);
  --ease-in: cubic-bezier(.4,0,1,1);
  --t-xs:  80ms; --t-sm: 130ms; --t: 200ms; --t-md: 280ms; --t-lg: 400ms;

  /* ── Typography ── */
  --font: 'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono: 'JetBrains Mono',ui-monospace,'SFMono-Regular','SF Mono',monospace;

  /* ── Sidebar widths ── */
  --sb: 248px; --sb-c: 64px;
}

/* Dark mode */
html.dark {
  --ink:    var(--s-50);  --ink-2:  var(--s-200); --ink-3:  var(--s-400);
  --muted:  var(--s-500); --border: var(--s-700);
  --border-subtle: var(--s-800);
  --surface:var(--s-950); --paper:  var(--s-900);
  --accent: var(--teal-400);
  --sh:    0 4px 8px rgba(0,0,0,.3),0 2px 4px rgba(0,0,0,.2);
  --sh-md: 0 8px 16px rgba(0,0,0,.4),0 4px 6px rgba(0,0,0,.2);
  --sh-lg: 0 20px 32px rgba(0,0,0,.5);
  color-scheme: dark;
}

/* === RESET & BASE ================================================ */
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--surface);color:var(--ink);}
body{
  font-family:var(--font);font-size:14px;line-height:1.55;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  letter-spacing:-0.01em;
}
*{font-family:inherit;}
a{color:inherit;text-decoration:none;}
button{background:none;border:none;padding:0;cursor:pointer;font:inherit;}
h1,h2,h3,h4{margin:0;font-weight:700;}

/* === TYPOGRAPHY ================================================= */
.t-h1{font-size:22px;font-weight:800;letter-spacing:-0.03em;line-height:1.15;}
.t-h2{font-size:17px;font-weight:700;letter-spacing:-0.02em;line-height:1.2;}
.t-h3{font-size:14px;font-weight:700;letter-spacing:-0.01em;line-height:1.3;}
.t-label{font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink-3);}
.t-meta{font-size:12px;color:var(--muted);}
.t-mono{font-family:var(--mono);font-variant-numeric:tabular-nums;}
.t-num-xl{font-family:var(--mono);font-size:34px;font-weight:700;letter-spacing:-0.04em;line-height:1;}
.t-num-lg{font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:-0.025em;line-height:1.1;}
.t-num{font-family:var(--mono);font-size:15px;font-weight:600;}
.t-muted{color:var(--muted);}
.t-ink2{color:var(--ink-2);}

/* === BUTTONS ================================================== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  font-weight:600;font-size:13.5px;letter-spacing:-0.01em;
  border:1.5px solid transparent;border-radius:var(--r);cursor:pointer;
  white-space:nowrap;height:36px;padding:0 14px;
  transition:background var(--t-sm) var(--ease),
             border-color var(--t-sm) var(--ease),
             color var(--t-sm) var(--ease),
             box-shadow var(--t-sm) var(--ease),
             transform var(--t-xs);
  outline:none;text-decoration:none;
}
.btn:focus-visible{box-shadow:0 0 0 3px rgba(14,116,144,.3);}
.btn:active:not(:disabled){transform:scale(.97);}
.btn:disabled,.btn[disabled]{opacity:.4;cursor:not-allowed;pointer-events:none;}
.btn-primary{background:var(--s-900);color:#fff;}
.btn-primary:hover:not(:disabled){background:var(--s-700);box-shadow:var(--sh-sm);}
html.dark .btn-primary{background:var(--s-100);color:var(--s-900);}
html.dark .btn-primary:hover:not(:disabled){background:var(--s-200);}
.btn-accent{background:var(--accent);color:#fff;}
.btn-accent:hover:not(:disabled){background:var(--teal-600);box-shadow:var(--sh-sm);}
.btn-accent-pill{border-radius:var(--pill);}
.btn-secondary{background:var(--paper);color:var(--ink-2);border-color:var(--border);}
.btn-secondary:hover:not(:disabled){background:var(--surface);border-color:var(--s-300);}
.btn-ghost{color:var(--ink-3);padding:0 10px;}
.btn-ghost:hover:not(:disabled){background:var(--surface);color:var(--ink-2);}
.btn-danger{color:var(--danger);}
.btn-danger:hover:not(:disabled){background:var(--danger-bg);color:var(--danger);}
.btn-sm{height:29px;padding:0 11px;font-size:12.5px;border-radius:var(--r-sm);}
.btn-lg{height:44px;padding:0 22px;font-size:15px;border-radius:var(--r-md);}
.btn-icon{width:36px;padding:0;}
.btn-icon.btn-sm{width:29px;}
.btn-busy{pointer-events:none;opacity:.6;}

/* === INPUTS ================================================== */
label,.field-label{display:block;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-3);margin-bottom:5px;}
input:not([type=checkbox]):not([type=radio]):not([type=file]):not([type=range]),
select,textarea,.inp{
  width:100%;font-family:var(--font);font-size:13.5px;color:var(--ink);
  background:var(--paper);border:1.5px solid var(--border);border-radius:var(--r);
  padding:0 12px;height:38px;outline:none;
  transition:border-color var(--t-sm),box-shadow var(--t-sm);
  letter-spacing:-0.01em;
}
textarea{height:auto;padding:10px 12px;resize:vertical;min-height:72px;line-height:1.5;}
input:not([type=checkbox]):not([type=radio]):not([type=file]):not([type=range]):focus,
select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(14,116,144,.12);}
::placeholder{color:var(--muted);}

/* === CARDS =================================================== */
.card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden;}
.card-body{padding:20px 24px;}
.card-body+.card-body{border-top:1px solid var(--border);}
.card-clickable{cursor:pointer;transition:border-color var(--t-sm),box-shadow var(--t-sm),transform var(--t-sm);}
.card-clickable:hover{border-color:var(--accent);box-shadow:var(--sh);transform:translateY(-2px);}

/* KPI metric card */
.metric-card{
  background:var(--paper);border:1px solid var(--border);
  border-radius:var(--r-xl);padding:20px 22px;
  position:relative;overflow:hidden;
}
.metric-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--mc-color,var(--accent));
}
.metric-card-value{font-family:var(--mono);font-size:28px;font-weight:700;letter-spacing:-0.035em;line-height:1;margin-bottom:6px;}
.metric-card-label{font-size:12px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--ink-3);}
.metric-card-sub{font-size:11.5px;color:var(--muted);margin-top:3px;}

/* === STATUS BADGES =========================================== */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11.5px;font-weight:600;letter-spacing:0.01em;
  padding:3px 9px;border-radius:var(--pill);border:1px solid;white-space:nowrap;
}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;}

.badge-green{color:#065f46;background:#ecfdf5;border-color:#86efac;}
.badge-green::before{background:#059669;}
.badge-sky{color:#0369a1;background:#f0f9ff;border-color:#7dd3fa;}
.badge-sky::before{background:#0ea5e9;}
.badge-red{color:#991b1b;background:#fef2f2;border-color:#fca5a5;}
.badge-red::before{background:#ef4444;}
.badge-amber{color:#78350f;background:#fffbeb;border-color:#fcd34d;}
.badge-amber::before{background:#f59e0b;}
.badge-violet{color:#4c1d95;background:#f5f3ff;border-color:#c4b5fd;}
.badge-violet::before{background:#7c3aed;}
.badge-orange{color:#7c2d12;background:#fff7ed;border-color:#fdba74;}
.badge-orange::before{background:#f97316;}
.badge-blue{color:#1e40af;background:#eff6ff;border-color:#93c5fd;}
.badge-blue::before{background:#3b82f6;}
.badge-slate{color:#334155;background:#f8fafc;border-color:#cbd5e1;}
.badge-slate::before{background:#94a3b8;}
.badge-cancel{color:#94a3b8;background:#f8fafc;border-color:#e2e8f0;text-decoration:line-through;}
.badge-cancel::before{background:#cbd5e1;}

/* RAG indicators */
.rag{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;letter-spacing:0.01em;}
.rag::before{content:'';width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.rag-g::before{background:var(--success);}
.rag-a::before{background:var(--warning);}
.rag-r::before{background:var(--danger);animation:rag-pulse 2s ease-in-out infinite;}
@keyframes rag-pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.4);}50%{box-shadow:0 0 0 5px rgba(220,38,38,0);}}

/* === TABLES ================================================= */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px;}
.tbl thead th{
  height:40px;padding:0 16px;text-align:left;
  font-size:10.5px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--muted);background:var(--surface);
  border-bottom:1.5px solid var(--border);
  position:sticky;top:0;z-index:5;user-select:none;
}
.tbl thead th[data-sort]{cursor:pointer;transition:color var(--t-sm);}
.tbl thead th[data-sort]:hover{color:var(--ink-2);}
.tbl tbody td{height:52px;padding:0 16px;border-bottom:1px solid var(--border-subtle);vertical-align:middle;}
.tbl tbody tr:last-child td{border-bottom:none;}
.tbl tbody tr{transition:background var(--t-xs);}
.tbl tbody tr:hover td{background:var(--surface);}

/* === MODALS ================================================ */

.prog-bar-sm{height:4px;border-radius:2px;}

/* Skeleton */

@keyframes skel{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* Loading bar */
#loading-bar{position:fixed;top:0;left:0;height:2px;z-index:300;background:linear-gradient(90deg,var(--teal-700),var(--teal-400));transition:width .3s var(--ease),opacity .2s;opacity:0;width:0;}

/* Toast */
#toast{position:fixed;bottom:20px;right:20px;z-index:200;}
.toast-inner{background:var(--s-900);color:#fff;font-size:13.5px;font-weight:500;padding:12px 16px;border-radius:var(--r-lg);box-shadow:var(--sh-lg);display:flex;align-items:center;gap:10px;max-width:360px;letter-spacing:-0.01em;animation:slide-up var(--t-md) var(--ease);}
.toast-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;}
.t-success .toast-icon{background:var(--success);}
.t-error   .toast-icon{background:var(--danger);}
.t-warn    .toast-icon{background:var(--warning);}
.t-info    .toast-icon{background:var(--info);}
.toast-undo{margin-left:4px;padding:3px 10px;background:rgba(255,255,255,.15);border-radius:var(--r-xs);font-size:10.5px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:background var(--t-sm);}
.toast-undo:hover{background:rgba(255,255,255,.25);}

/* Offline */
.offline-bar{position:fixed;top:0;left:0;right:0;z-index:400;background:var(--danger);color:#fff;font-size:12px;font-weight:700;text-align:center;padding:7px;letter-spacing:0.02em;}

/* Health dot */
.health-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;}

/* Animations */
.fade{animation:fade-in var(--t-md) var(--ease);}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}
@keyframes slide-up{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@keyframes modal-rise{from{opacity:0;transform:scale(.96) translateY(10px);}to{opacity:1;transform:none;}}
.rise{animation:slide-up var(--t-md) var(--ease);}
.rise-1{animation:slide-up var(--t-md) var(--ease) 40ms backwards;}
.rise-2{animation:slide-up var(--t-md) var(--ease) 80ms backwards;}
.rise-3{animation:slide-up var(--t-md) var(--ease) 120ms backwards;}

/* Timeline */
.tl-line{position:relative;padding-left:20px;}
.tl-line::before{content:'';position:absolute;left:6px;top:12px;bottom:0;width:1.5px;background:var(--border);}
.tl-dot{position:absolute;left:0;top:3px;width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid var(--paper);box-shadow:0 0 0 2px rgba(14,116,144,.2);}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;}
.empty-icon{width:48px;height:48px;border-radius:var(--r-lg);background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:16px;color:var(--muted);}
.empty-title{font-size:15px;font-weight:700;color:var(--ink-2);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--muted);max-width:320px;line-height:1.55;}

/* Cmd palette */
.cmdp-inp{flex:1;font-size:15px;color:var(--ink);background:none;border:none;outline:none;padding:0;}
.cmdp-inp::placeholder{color:var(--muted);}

/* Focus */
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:2px;}

/* Scrollbars */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--s-300);}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){*,::before,::after{animation-duration:.01ms !important;transition-duration:.01ms !important;}}

/* Responsive */
@media(max-width:767px){.page{padding:16px;}}

// ─── STATUS MAPS ──────────────────────────────────────────────────
const STATUSES=['Not Started','In Progress','At Risk','On Hold — Internal','On Hold — Client','Pending Client','Under Review','Delayed','Cancelled','Completed'];
const ROLES=['viewer','editor','admin'];
const PHASES=['BPU','BPU Signoff','CRP','CRP Signoff','UAT','UAT Signoff','Data Migration / Production Migration','Go Live','Hypercare'];
const SIGNOFF_PHASES=['BPU Signoff','CRP Signoff','UAT Signoff'];

const MILESTONE_STATUSES=['Pending','Achieved','Missed'];

const AMS_ENTRY_STATUSES=['Open','In Progress','Closed'];

// badge class per status

  'Completed':          'badge badge-green',

  'At Risk':            'badge badge-red',
  'On Hold — Internal': 'badge badge-violet',

// hex colour for bar charts

  'Completed':[16,185,129],'In Progress':[14,165,233],'At Risk':[244,63,94],

// ─── STATE ────────────────────────────────────────────────────────
const S={
  user:null,clients:[],archivedClients:[],users:[],usersForDropdown:[],
  shas:{clients:null,users:null},sessionToken:null,view:'login',params:{},

  expandedHistory:new Set(),amsFrom:'',amsTo:'',amsQuick:'',

  cmdPaletteOpen:false,cmdQuery:'',recentlyViewed:[],darkMode:false,

};

try{S.sidebarCollapsed=localStorage.getItem('itk_sb_collapsed')==='1';}catch(e){}
try{const r=localStorage.getItem('itk_recent');if(r)S.recentlyViewed=JSON.parse(r);}catch(e){}
try{S.darkMode=localStorage.getItem('itk_dark')==='1';}catch(e){}
if(S.darkMode)document.documentElement.classList.add('dark');

window.addEventListener('online',()=>{S.offlineMode=false;render();});

let _undoTimer=null,_undoFn=null;
function scheduleUndo(label,undoFn){
  if(_undoTimer)clearTimeout(_undoTimer);
  _undoFn=undoFn;
  showToast(`${label} — undo?`,'warn',5000,'undo-delete');
  _undoTimer=setTimeout(()=>{_undoFn=null;_undoTimer=null;},5000);
}
function execUndo(){if(_undoFn){_undoFn();_undoFn=null;if(_undoTimer){clearTimeout(_undoTimer);_undoTimer=null;}showToast('Restored ✓');}}

// ─── UTILS ────────────────────────────────────────────────────────
async function sha256(str){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
function persistSession(token,user){try{localStorage.setItem('itk_sess',btoa(JSON.stringify({token,user})));}catch(e){}}
function clearSession(){try{localStorage.removeItem('itk_sess');}catch(e){}}
function restoreSession(){try{const r=localStorage.getItem('itk_sess');return r?JSON.parse(atob(r)):null;}catch(e){return null;}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(s){if(!s)return'—';try{return new Date(s).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}catch{return s;}}
function can(p){if(!S.user)return false;const r={admin:3,editor:2,viewer:1};return(r[S.user.role]||0)>=(r[p]||0);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function daysDiff(dateStr){if(!dateStr)return null;const d=new Date(dateStr+'T00:00:00');const t=new Date(todayStr()+'T00:00:00');return Math.round((t-d)/86400000);}
function isOverdue(i){if(i.status==='Completed'||!i.dueDate)return false;return daysDiff(i.dueDate)>0;}
function daysOverdue(i){return daysDiff(i.dueDate);}
function lastUpdateDate(i){return i.timeline?.[0]?.date||null;}
function isStale(i,days=7){if(i.status==='Completed')return false;const lu=lastUpdateDate(i);if(!lu)return true;return daysDiff(lu)>=days;}
function entryDate(e){return e.dateRaised||e.date||'';}
function entryType(e){return e.type||e.category||'—';}
function entryRaisedBy(e){return e.raisedBy||e.loggedBy||'—';}
function currencySymbol(client){return CURRENCIES[client?.currency||'INR']?.symbol||'₹';}

function fileIcon(url='',mimeType=''){
  const u=url.toLowerCase();const m=mimeType.toLowerCase();
  if(m.includes('pdf')||u.endsWith('.pdf'))return'pdf';
  if(m.includes('sheet')||m.includes('excel')||u.endsWith('.xlsx')||u.endsWith('.xls'))return'xlsx';
  if(m.includes('image')||u.match(/\.(jpg|jpeg|png|gif|webp)(\?|$)/))return'img';
  return'file';
}

async function uploadAttachment(file){
  const MAX=3*1024*1024;
  const ALLOWED=['application/pdf','application/vnd.openxmlformats-officedocument.spreadsheetml.sheet','application/vnd.ms-excel','image/jpeg','image/jpg','image/png','image/gif','image/webp'];
  if(!ALLOWED.includes(file.type)&&file.type!=='')throw new Error('Unsupported file type. Use PDF, Excel or images.');
  if(file.size>MAX)throw new Error(`File too large (${(file.size/1024/1024).toFixed(1)}MB). Max 3MB.`);
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=async e=>{
      const base64=e.target.result.split(',')[1];
      try{
        const r=await fetch('/api/upload',{method:'POST',headers:{'Content-Type':'application/json','x-session-token':S.sessionToken||''},body:JSON.stringify({base64,fileName:file.name,mimeType:file.type||'application/octet-stream'})});
        const data=await r.json();
        if(!r.ok)throw new Error(data.error||'Upload failed');
        resolve(data);
      }catch(err){reject(err);}
    };
    reader.onerror=()=>reject(new Error('Failed to read file'));
    reader.readAsDataURL(file);
  });
}

function attachmentChip(att){
  if(!att?.url)return'';
  const icons={pdf:'📄',xlsx:'📊',img:'🖼',file:'📎'};
  const icon=icons[fileIcon(att.url,att.mimeType||'')]||'📎';
  const name=att.fileName||att.label||'Attachment';
  return`<a href="${esc(att.url)}" target="_blank" rel="noopener noreferrer" class="chip" style="margin-top:6px;font-size:11px;color:var(--accent);" title="${esc(name)}">${icon} <span style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(name)}</span></a>`;
}

function parseUsersCsv(text){
  const lines=text.trim().split('\n').filter(l=>l.trim());if(!lines.length)return[];
  const hasHeader=lines[0].toLowerCase().includes('username');
  const dataLines=hasHeader?lines.slice(1):lines;
  return dataLines.map((line,i)=>{
    const p=line.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
    const[username,full_name,role,email,password]=p;let error=null;
    if(!username)error='Username required';
    else if(!full_name)error='Full name required';
    else if(!role||!ROLES.includes(role.toLowerCase()))error=`Role must be: ${ROLES.join('/')}`;
    else if(!password)error='Password required';
    else if((S.users||[]).find(u=>u.username===username))error=`"${username}" already exists`;
    return{username,name:full_name,role:role?.toLowerCase(),email:email||'',password,error,row:i+(hasHeader?2:1)};
  });
}

function parseAmsEntriesCsv(text){
  const lines=text.trim().split('\n').filter(l=>l.trim());if(!lines.length)return[];
  const hasHeader=lines[0].toLowerCase().includes('date_raised')||lines[0].toLowerCase().includes('date raised');
  const dataLines=hasHeader?lines.slice(1):lines;
  return dataLines.map((line,i)=>{
    const p=line.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
    const[date_raised,due_date,raised_by,module,project,description,type,query_level,entry_status,mode_of_support,hours]=p;
    let error=null;
    if(!date_raised)error='date_raised required';
    else if(!hours||isNaN(parseFloat(hours)))error='hours required (number)';
    else if(!description)error='description required';
    return{dateRaised:date_raised,dueDate:due_date||'',raisedBy:raised_by||'',module:module||'',project:project||'',description:description||'',type:type||AMS_TYPES[0],queryLevel:query_level||AMS_QUERY_LEVELS[0],entryStatus:entry_status||'Open',modeOfSupport:mode_of_support||AMS_MODES[0],hours:parseFloat(hours)||0,error,row:i+(hasHeader?2:1)};
  });
}

function parseIntegrationsCsv(text,existingIntegs=[]){
  const lines=text.trim().split('\n').filter(l=>l.trim());if(!lines.length)return[];
  const hasHeader=lines[0].toLowerCase().includes('name')||lines[0].toLowerCase().includes('integration');
  const dataLines=hasHeader?lines.slice(1):lines;
  return dataLines.map((line,i)=>{
    const p=line.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
    const[name,status,assignee,due_date,description,next_action]=p;let error=null;
    if(!name)error='name required';
    else if(existingIntegs.find(x=>x.name.toLowerCase()===name.toLowerCase()))error=`"${name}" already exists`;
    return{name:name||'',status:STATUSES.includes(status)?status:'Not Started',assignee:assignee||'',dueDate:due_date||'',description:description||'',nextAction:next_action||'',error,row:i+(hasHeader?2:1)};
  });
}

  else if(view==='ams-client-detail'){const c=S.clients.find(x=>x.id===params.clientId);if(c)entry={type:'amsClient',label:c.name,sub:'AMS Client',view,params:{clientId:c.id}};}

async function apiRead(path){
  startLoading();
  try{
    const r=await fetch(`/api/read?path=${encodeURIComponent(path)}`,{headers:{'x-session-token':S.sessionToken||''}});
    if(!r.ok)throw new Error(`Read ${r.status}`);
    const d=await r.json();
    if(d.message&&!d.content)throw new Error(d.message);
    return{content:JSON.parse(atob(d.content.replace(/\n/g,''))),sha:d.sha};
  }finally{stopLoading();}
}
async function apiWrite(path,obj,sha,msg){
  startLoading();
  try{
    const r=await fetch('/api/write',{method:'POST',headers:{'Content-Type':'application/json','x-session-token':S.sessionToken||''},body:JSON.stringify({path,content:JSON.stringify(obj,null,2),sha,message:msg})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||e.message||`Write ${r.status}`);}
    const d=await r.json();return d.sha||d.content?.sha;
  }finally{stopLoading();}
}

function ragBadge(rag){
  if(!rag)return'<span style="color:var(--muted);font-size:12px;">—</span>';
  const cls={Red:'rag rag-r',Amber:'rag rag-a',Green:'rag rag-g'}[rag]||'rag';
  return`<span class="${cls}">${rag}</span>`;
}

function implAutoRag(client){
  const today=todayStr();let hasRed=false,hasAmber=false,hasInProgress=false;
  (client.modules||[]).forEach(m=>(m.phases||[]).forEach(ph=>{
    if(ph.status==='Completed'||ph.status==='Not Started')return;
    hasInProgress=true;
    if(ph.status==='At Risk'){hasRed=true;return;}
    if(ph.targetDate){const d=daysDiff(ph.targetDate);if(d>=14){hasRed=true;return;}if(d>=1){hasAmber=true;return;}}
    const updates=ph.updates||[];
    if(!updates.length){hasAmber=true;return;}
    const lastUpd=updates.reduce((a,u)=>{const dt=u.addedAt||u.date||'';return dt>a?dt:a;},'');
    const daysAgo=lastUpd?Math.floor((Date.now()-new Date(lastUpd))/86400000):99;
    if(daysAgo>=14)hasRed=true;else if(daysAgo>=7)hasAmber=true;
  }));
  if(!hasInProgress&&(client.modules||[]).length>0)return'Green';
  if(hasRed)return'Red';if(hasAmber)return'Amber';
  if(!hasInProgress)return null;return'Green';
}

function implProgress(client){
  let total=0,completed=0,atRisk=0;
  (client.modules||[]).forEach(m=>(m.phases||[]).forEach(ph=>{total++;if(ph.status==='Completed')completed++;if(ph.status==='At Risk')atRisk++;}));
  return{total,completed,atRisk,pct:total?Math.round(completed/total*100):0};
}

function amsTotals(client,fromDate,toDate){
  const allLog=client.workLog||[];
  const log=allLog.filter(e=>(!fromDate||entryDate(e)>=fromDate)&&(!toDate||entryDate(e)<=toDate));
  const totalHours=log.reduce((a,e)=>a+Number(e.hours||0),0);
  const allTimeHours=allLog.reduce((a,e)=>a+Number(e.hours||0),0);
  const bucket=client.totalAvailableHours;
  const hasBucket=bucket!==undefined&&bucket!==null&&bucket>0;
  const hasRate=!!(client.manDayRate>0);
  let billableHours=totalHours,coveredHours=0,balanceAvailable=null;
  if(hasBucket){
    const hoursBeforePeriod=fromDate?allLog.filter(e=>entryDate(e)<fromDate).reduce((a,e)=>a+Number(e.hours||0),0):0;
    const remainingAtPeriodStart=Math.max(0,bucket-hoursBeforePeriod);
    coveredHours=Math.min(totalHours,remainingAtPeriodStart);
    billableHours=Math.max(0,totalHours-remainingAtPeriodStart);
    balanceAvailable=Math.max(0,bucket-allTimeHours);
  }
  const totalAmount=hasRate?((billableHours/HOURS_PER_DAY)*client.manDayRate)||0:null;
  const byType={};
  log.forEach(e=>{const tp=entryType(e);byType[tp]=(byType[tp]||0)+Number(e.hours||0);});
  return{log,totalHours,totalAmount,byType,hasRate,hasBucket,totalAvailableHours:bucket,billableHours,coveredHours,consumedAllTime:allTimeHours,balanceAvailable};
}

function amsClientRag(client){
  const entries=client.workLog||[];const open=entries.filter(e=>(e.entryStatus||'Open')!=='Closed');
  if(!entries.length)return null;
  if(open.some(e=>e.ragStatus==='Red'))return'Red';
  if(open.some(e=>e.dueDate&&e.dueDate<todayStr()))return'Red';
  if(open.some(e=>e.ragStatus==='Amber'))return'Amber';
  const threeDays=new Date();threeDays.setDate(threeDays.getDate()+3);const soonStr=threeDays.toISOString().slice(0,10);
  if(open.some(e=>e.dueDate&&e.dueDate<=soonStr&&e.dueDate>=todayStr()))return'Amber';
  if(open.length===0&&entries.length>0)return'Green';
  return'Green';
}

// ─── RENDER ───────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  if(S.view==='login'){app.innerHTML=renderLogin();return;}
  let content='';
  if(S.view==='dashboard')content=renderDashboard();
  else if(S.view==='clients')content=renderClientList();
  else if(S.view==='client-detail')content=renderClientDetail(S.params.clientId);
  else if(S.view==='integ-detail')content=renderIntegDetail(S.params.clientId,S.params.integId);
  else if(S.view==='impl-clients')content=renderImplClientList();
  else if(S.view==='impl-client-detail')content=renderImplClientDetail(S.params.clientId);
  else if(S.view==='impl-phase-detail')content=renderImplPhaseDetail(S.params.clientId,S.params.moduleId,S.params.phase);
  else if(S.view==='ams-clients')content=renderAmsClientList();
  else if(S.view==='ams-client-detail')content=renderAmsClientDetail(S.params.clientId);
  else if(S.view==='admin')content=can('admin')?renderAdmin():`<div class="page"><div style="color:var(--danger);padding:40px 0;">Access denied.</div></div>`;
  const isMobile=window.innerWidth<768;
  const sbw=isMobile?'0':(S.sidebarCollapsed?'var(--sb-c)':'var(--sb)');
  app.innerHTML=`
    ${S.offlineMode?`<div class="offline-bar">You appear to be offline — saves will fail until connection is restored</div>`:''}
    ${renderSidebar()}
    <main style="margin-left:${sbw};transition:margin-left var(--t-md) var(--ease);min-height:100vh;${S.offlineMode?'padding-top:34px;':''}">
      ${isMobile?`<div style="position:fixed;top:12px;left:12px;z-index:50;"><button data-act="toggle-sidebar" class="btn btn-secondary btn-icon" style="box-shadow:var(--sh-md);">${IC.menu}</button></div>`:''}
      <style>@keyframes spin{to{transform:rotate(360deg);}}</style>
      ${content}
    </main>
    ${S.modal?renderModal():''}
    ${S.cmdPaletteOpen?renderCmdPalette():''}
    ${isMobile&&!S.sidebarCollapsed?`<div data-act="toggle-sidebar" style="position:fixed;inset:0;background:rgba(2,6,23,.5);z-index:30;backdrop-filter:blur(2px);"></div>`:''} `;
}

// ─── DASHBOARD ────────────────────────────────────────────────────
function renderDashboard(){
  const all=S.clients.flatMap(c=>c.integrations.map(i=>({...i,clientName:c.name,clientId:c.id})));
  const ti=all.length,ar=all.filter(i=>i.status==='At Risk').length;
  const ip=all.filter(i=>i.status==='In Progress').length,co=all.filter(i=>i.status==='Completed').length;
  const overdue=all.filter(isOverdue);const stale=all.filter(i=>isStale(i,7)&&!isOverdue(i));
  const weekAgo=new Date(Date.now()-7*86400000);
  const thisWeekUpdates=all.reduce((n,i)=>n+(i.timeline||[]).filter(t=>new Date(t.date)>=weekAgo).length,0);
  const needsAttn=[...overdue.map(i=>({...i,reason:'overdue'})),...stale.map(i=>({...i,reason:'stale'}))];
  const implClients=S.clients.filter(c=>c.modules!==undefined);
  const amsClients=S.clients.filter(c=>c.workLog!==undefined);
  const now=new Date();const monthStart=new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10);
  let amsHours=0,amsRevINR=0,amsRevUSD=0;const amsLow=[];
  amsClients.forEach(c=>{
    const t=amsTotals(c,monthStart,todayStr());
    amsHours+=t.totalHours;
    if(t.totalAmount){if((c.currency||'INR')==='USD')amsRevUSD+=t.totalAmount;else amsRevINR+=t.totalAmount;}
    if(t.hasBucket&&t.balanceAvailable<=Math.max(2,t.totalAvailableHours*0.15))amsLow.push({name:c.name,id:c.id,balance:t.balanceAvailable,total:t.totalAvailableHours});
  });
  const weekAgoStr=weekAgo.toISOString().slice(0,10);
  const userUpdates={};
  S.clients.forEach(c=>{
    (c.integrations||[]).forEach(i=>(i.timeline||[]).filter(t=>t.date>=weekAgoStr).forEach(t=>{const u=t.addedBy||'?';userUpdates[u]=(userUpdates[u]||0)+1;}));
    (c.modules||[]).forEach(m=>(m.phases||[]).forEach(ph=>(ph.updates||[]).filter(u=>u.date>=weekAgoStr).forEach(u=>{const n=u.addedBy||'?';userUpdates[n]=(userUpdates[n]||0)+1;})));
    (c.workLog||[]).filter(e=>entryDate(e)>=weekAgoStr).forEach(e=>{const u=entryRaisedBy(e);userUpdates[u]=(userUpdates[u]||0)+1;});
  });
  const topUsers=Object.entries(userUpdates).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const atRiskPct=ti>0?Math.round(ar/ti*100):0;
  const metrics=[
    {label:'Clients',value:S.clients.length,sub:'total',color:'var(--teal-700)'},
    {label:'Integrations',value:ti,sub:'tracked',color:'var(--info)'},
    {label:'In Progress',value:ip,sub:`${ti?Math.round(ip/ti*100):0}% of total`,color:'var(--teal-600)'},
    {label:'At Risk',value:ar,sub:atRiskPct?`${atRiskPct}% of total`:'all clear',color:ar>0?'var(--danger)':'var(--success)'},
    {label:'Updates',value:thisWeekUpdates,sub:'past 7 days',color:'var(--violet)'},
  ];
  return`<div class="page fade">
  <div class="page-hdr">
    <div>
      <h1 class="t-h1">Dashboard</h1>
      <p style="font-size:14px;color:var(--muted);margin-top:4px;">Delivery overview across all clients</p>
    </div>
    ${can('admin')?`<button data-act="portfolio-export" class="btn btn-primary">${IC.dl} Portfolio Export</button>`:''}
  </div>

  <!-- KPI cards -->
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:28px;">
    ${metrics.map((m,i)=>`<div class="metric-card rise-${i%3}" style="--mc-color:${m.color};animation-delay:${i*40}ms;">
      <div class="metric-card-value">${m.value}</div>
      <div class="metric-card-label">${m.label}</div>
      <div class="metric-card-sub">${m.sub}</div>
    </div>`).join('')}
  </div>

  <!-- Main grid -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
    <!-- Needs attention -->
    <div class="card">
      <div class="card-body" style="display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;">
        <div>
          <h3 class="t-h3" style="display:flex;align-items:center;gap:8px;">
            ${IC.warn} Needs Attention
            ${needsAttn.length?`<span class="badge badge-red" style="font-size:10px;">${needsAttn.length}</span>`:''}
          </h3>
        </div>
        <button data-act="nav-clients" class="btn btn-ghost btn-sm" style="font-size:12px;">View all →</button>
      </div>
      <div style="max-height:300px;overflow-y:auto;">
        ${needsAttn.length?needsAttn.slice(0,10).map((i,idx)=>`<div data-act="open-integ" data-cid="${i.clientId}" data-iid="${i.id}" style="display:flex;align-items:center;gap:12px;padding:12px 24px;border-bottom:1px solid var(--border-subtle);cursor:pointer;transition:background var(--t-xs);" onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background=''">
          <div style="width:3px;height:36px;border-radius:2px;background:${i.reason==='overdue'?'var(--danger)':'var(--warning)'};flex-shrink:0;"></div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:13.5px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(i.name)}">${esc(i.name)}</div>
            <div style="font-size:12px;color:var(--muted);">${esc(i.clientName)} · ${esc(i.assignee||'Unassigned')}</div>
          </div>
          ${i.reason==='overdue'
            ?`<span class="badge badge-red" style="font-size:10px;">⏱ ${daysOverdue(i)}d</span>`
            :`<span class="badge badge-amber" style="font-size:10px;">No update ${lastUpdateDate(i)?daysDiff(lastUpdateDate(i))+'d':''}</span>`}
        </div>`).join('')
        :emptyState('chart','All caught up','No overdue or stale integrations')}
      </div>
    </div>

    <!-- Status by client -->
    <div class="card">
      <div class="card-body" style="padding-bottom:14px;">
        <h3 class="t-h3">Status by Client</h3>
      </div>
      <div style="max-height:300px;overflow-y:auto;">
        ${S.clients.map((c,i)=>{
          const tot=c.integrations.length||1;
          return`<div data-act="open-client" data-id="${c.id}" style="padding:10px 24px;border-bottom:1px solid var(--border-subtle);cursor:pointer;transition:background var(--t-xs);" onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background=''">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
              <span style="font-size:13px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%;" title="${esc(c.name)}">${esc(c.name)}</span>
              <span style="font-size:12px;color:var(--muted);flex-shrink:0;">${c.integrations.length}</span>

            <div class="prog-bar prog-bar-sm">${sBar(c.integrations)||`<div style="width:100%;background:var(--border);border-radius:2px;"></div>`}</div>

  <!-- Second row -->

    <div class="card">
      <div class="card-body">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <h3 class="t-h3">${IC.bar} Implementations</h3>

            ${amsRevUSD>0?`<div class="t-num-lg t-mono" style="color:var(--success);">$${amsRevUSD.toLocaleString('en-US',{maximumFractionDigits:0})}</div>`:''}

            <div style="font-size:11px;color:var(--muted);margin-top:3px;">Billable this month</div>
          </div>`:
          `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px;">
            <div class="t-num-lg">${amsClients.length}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:3px;">Active clients</div>
          </div>`}

        ${amsLow.slice(0,3).map(c=>`<div data-act="open-ams-client" data-id="${c.id}" style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;cursor:pointer;border-bottom:1px solid var(--border-subtle);font-size:12px;color:var(--danger);" onmouseover="this.style.opacity='.7'" onmouseout="this.style.opacity='1'">
          <span class="rag rag-r">${esc(c.name)} pool low</span>
          <span class="t-mono">${c.balance.toFixed(1)}h</span>

      </div>

    <!-- Team activity -->
    <div class="card">
      <div class="card-body">
        <h3 class="t-h3" style="margin-bottom:16px;">${IC.team||'👥'} Team Activity</h3>
        ${topUsers.length?topUsers.map(([name,count],i)=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--teal-700),var(--teal-500));color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${i+1}</div>
          <div style="flex:1;min-width:0;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(name)}</div>
          <div class="t-mono" style="font-size:13px;font-weight:700;color:var(--accent);flex-shrink:0;">${count}</div>
          <div style="width:50px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0;">
            <div style="height:100%;border-radius:2px;background:var(--accent);width:${Math.round(count/topUsers[0][1]*100)}%;"></div>
          </div>
        </div>`).join('')
        :emptyState('team','No updates yet','Activity appears here as your team adds updates')}
      </div>
    </div>
  </div>

  <!-- Status distribution -->
  <div class="card">
    <div class="card-body">
      <h3 class="t-h3" style="margin-bottom:16px;">Overall Status Distribution</h3>
      <div class="prog-bar" style="height:8px;margin-bottom:14px;">${sBar(all)||`<div style="width:100%;background:var(--border);border-radius:3px;"></div>`}</div>
      <div style="display:flex;flex-wrap:wrap;gap:12px 20px;">
        ${STATUSES.map(s=>{const n=all.filter(i=>i.status===s).length;return`<div style="display:flex;align-items:center;gap:6px;font-size:12px;">
          <div style="width:8px;height:8px;border-radius:2px;background:#${SHEX[s]||'94a3b8'};flex-shrink:0;"></div>
          <span style="color:var(--muted);">${s}:</span>
          <span style="font-weight:700;color:var(--ink-2);">${n}</span>
        </div>`;}).join('')}
      </div>
    </div>
  </div>
</div>`;
}

// ─── CLIENT LIST ──────────────────────────────────────────────────
function renderClientList(){
  const q=S.search.toLowerCase();
  const fl=S.clients.filter(c=>c.name.toLowerCase().includes(q));
  const ti=S.clients.reduce((a,c)=>a+c.integrations.length,0);
  const ar=S.clients.reduce((a,c)=>a+c.integrations.filter(i=>i.status==='At Risk').length,0);
  const ip=S.clients.reduce((a,c)=>a+c.integrations.filter(i=>i.status==='In Progress').length,0);
  return`<div class="page fade">
  <div class="page-hdr">
    <div>
      <h1 class="t-h1">Integrations</h1>
      <p style="font-size:14px;color:var(--muted);margin-top:4px;">${S.clients.length} clients · ${ti} integrations tracked</p>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="position:relative;">
        <div style="position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;">${IC.search}</div>
        <input id="search-inp" data-act="search" type="text" placeholder="Search clients…" value="${esc(S.search)}" style="padding-left:34px;width:220px;"/>
      </div>
      <button data-act="modal-open" data-modal="add-client" class="btn btn-primary">${IC.plus} New Client</button>
    </div>
  </div>
  <!-- stat strip -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;">
    ${[
      {l:'Clients',v:S.clients.length,c:'var(--teal-700)'},
      {l:'Integrations',v:ti,c:'var(--info)'},
      {l:'In Progress',v:ip,c:'var(--teal-600)'},
      {l:'At Risk',v:ar,c:ar>0?'var(--danger)':'var(--success)'},
    ].map(m=>`<div style="background:var(--paper);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 18px;border-top:3px solid ${m.c};">
      <div class="t-num-lg">${m.v}</div>
      <div style="font-size:11.5px;color:var(--muted);margin-top:3px;font-weight:600;letter-spacing:0.03em;text-transform:uppercase;">${m.l}</div>
    </div>`).join('')}
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
    ${fl.length?fl.map((c,idx)=>{
      const ar2=c.integrations.filter(i=>i.status==='At Risk').length;
      const od2=c.integrations.filter(isOverdue).length;
      return`<div data-act="open-client" data-id="${c.id}" class="card card-clickable" style="animation:slide-up var(--t-md) var(--ease) ${Math.min(idx*30,400)}ms backwards;position:relative;overflow:visible;">
        <div style="position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r-xl) var(--r-xl) 0 0;background:${healthColor(c)};"></div>
        <div class="card-body">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;">
            <div style="flex:1;min-width:0;padding-right:12px;">
              <div style="font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(c.name)}">${esc(c.name)}</div>
              ${c.description?`<div style="font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(c.description)}">${esc(c.description)}</div>`:''}
            </div>
            <div class="t-num-lg" style="color:var(--accent);flex-shrink:0;">${c.integrations.length}</div>
          </div>
          <div class="prog-bar prog-bar-sm" style="margin-bottom:10px;">${sBar(c.integrations)||`<div style="width:100%;background:var(--border);border-radius:2px;"></div>`}</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${ar2>0?`<span class="badge badge-red" style="font-size:10.5px;">⚠ ${ar2} at risk</span>`:''}
            ${od2>0?`<span class="badge badge-amber" style="font-size:10.5px;">⏱ ${od2} overdue</span>`:''}
            ${!ar2&&!od2?`<span style="font-size:12px;color:var(--muted);">All on track</span>`:''}
          </div>
        </div>
      </div>`;
    }).join(''):emptyState('search','No clients found',`No results for "${esc(S.search)}"`)}
  </div>
</div>`;
}

// ─── CLIENT DETAIL ────────────────────────────────────────────────
function renderClientDetail(clientId){
  const c=S.clients.find(x=>x.id===clientId);
  if(!c)return`<div class="page"><div class="empty-state">Client not found</div></div>`;
  const fl=S.filter==='all'?c.integrations:c.integrations.filter(i=>i.status===S.filter);
  const sorted=sortIntegs(fl);
  const cols=[['name','Integration'],['status','Status'],['assignee','Assignee'],['due','Due Date'],['lastUpdate','Last Update']];
  return`<div class="page fade">
  <div class="crumbs">
    <button data-act="nav-clients">Integrations</button>
    <span class="sep">›</span>
    <span style="color:var(--ink-2);font-weight:600;">${esc(c.name)}</span>
  </div>
  <div class="page-hdr">
    <div>
      <h1 class="t-h1">${esc(c.name)}</h1>
      ${c.description?`<p style="font-size:14px;color:var(--muted);margin-top:4px;">${esc(c.description)}</p>`:''}
    </div>
    <div style="position:relative;display:inline-block;" class="export-menu-wrap">
      <button class="btn btn-primary" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='block'?'none':'block'">${IC.dl} Export ▾</button>
      <div style="display:none;position:absolute;right:0;top:calc(100% + 4px);background:var(--paper);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-lg);min-width:200px;z-index:20;overflow:hidden;">
        <button data-act="exp-pptx" data-id="${c.id}" class="btn btn-ghost" style="width:100%;justify-content:flex-start;padding:10px 16px;border-radius:0;font-size:13px;">📊 PowerPoint</button>
        <button data-act="exp-pdf"  data-id="${c.id}" class="btn btn-ghost" style="width:100%;justify-content:flex-start;padding:10px 16px;border-radius:0;font-size:13px;">📄 PDF Report</button>
        <button data-act="exp-excel" data-etype="integrations" data-cid="${c.id}" class="btn btn-ghost" style="width:100%;justify-content:flex-start;padding:10px 16px;border-radius:0;font-size:13px;">📋 Excel — Integrations</button>
        <button data-act="exp-excel" data-etype="milestones" data-cid="${c.id}" class="btn btn-ghost" style="width:100%;justify-content:flex-start;padding:10px 16px;border-radius:0;font-size:13px;">🎯 Excel — Milestones</button>
        <div style="height:1px;background:var(--border);margin:4px 0;"></div>
        <button data-act="open-import-integ" data-cid="${c.id}" class="btn btn-ghost" style="width:100%;justify-content:flex-start;padding:10px 16px;border-radius:0;font-size:13px;">⬆ Import CSV</button>
      </div>
    </div>
  </div>
  <!-- filter chips -->
  <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;align-items:center;flex-wrap:wrap;">
    ${['all',...STATUSES].map(st=>`<button data-act="filter" data-filter="${st}" class="chip" style="${S.filter===st?'border-color:var(--accent);color:var(--accent);font-weight:700;background:rgba(14,116,144,.06);':''}">${st==='all'?`All (${c.integrations.length})`:esc(st)+` (${c.integrations.filter(i=>i.status===st).length})`}</button>`).join('')}
    <button data-act="modal-open" data-modal="add-integ" data-cid="${c.id}" class="btn btn-accent btn-sm" style="margin-left:auto;flex-shrink:0;border-radius:var(--pill);">${IC.plus} Add</button>
  </div>
  <div class="card">
    <div style="overflow-x:auto;">
      <table class="tbl">
        <thead><tr>${cols.map(([k,l])=>`<th data-act="sort" data-key="${k}" data-sort style="cursor:pointer;">${l}${sortArrow(k)}</th>`).join('')}</tr></thead>
        <tbody>
          ${sorted.length?sorted.map(i=>{
            const lu=lastUpdateDate(i);
            return`<tr data-act="open-integ" data-cid="${c.id}" data-iid="${i.id}" style="cursor:pointer;">
              <td>
                <div style="font-size:14px;font-weight:600;color:var(--ink);" title="${esc(i.name)}">${esc(i.name)}</div>
                ${i.description?`<div style="font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:280px;">${esc(i.description)}</div>`:''}
              </td>
              <td>${sbadge(i.status)}</td>
              <td style="color:var(--ink-2);">${esc(i.assignee||'—')}</td>
              <td><div style="display:flex;flex-direction:column;gap:4px;">${fmtDate(i.dueDate)!=='—'?`<span style="font-size:13px;">${fmtDate(i.dueDate)}</span>`:'<span style="color:var(--muted);">—</span>'}${isOverdueBadge(i)}</div></td>
              <td style="font-size:13px;">${lu?fmtDate(lu):`<span style="color:var(--warning);font-size:12px;font-weight:600;">No updates yet</span>`}</td>
            </tr>`;}).join('')
          :`<tr><td colspan="5">${emptyState('inbox','No integrations','No integrations match this filter')}</td></tr>`}
        </tbody>
      </table>
    </div>
  </div>
</div>`;
}

// ─── INTEG DETAIL ─────────────────────────────────────────────────
function renderIntegDetail(clientId,integId){
  const c=S.clients.find(x=>x.id===clientId);
  const i=c?.integrations.find(x=>x.id===integId);
  if(!c||!i)return`<div class="page"><div class="empty-state">Not found</div></div>`;
  return`<div class="page fade" style="max-width:1100px;">
  <div class="crumbs">
    <button data-act="nav-clients">Integrations</button><span class="sep">›</span>
    <button data-act="open-client" data-id="${c.id}">${esc(c.name)}</button><span class="sep">›</span>
    <span style="color:var(--ink-2);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px;" title="${esc(i.name)}">${esc(i.name)}</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:24px;">
    <h1 class="t-h1">${esc(i.name)}</h1>
    ${sbadge(i.status)}
    ${isOverdueBadge(i)}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1.2fr;gap:20px;">
    <!-- Details card -->
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div class="card">
        <div class="card-body">
          <h3 class="t-h3" style="margin-bottom:18px;">Details</h3>
          <div style="display:flex;flex-direction:column;gap:14px;">
            <div><label>Status</label>
              ${can('edit')?`<select id="f-status" style="margin-top:5px;">${STATUSES.map(s=>`<option${s===i.status?' selected':''}>${s}</option>`).join('')}</select>`:sbadge(i.status)}</div>
            <div><label>Assignee</label><div style="margin-top:5px;">${can('edit')?assigneeSelect('f-assignee',i.assignee||''):`<p style="font-size:14px;font-weight:500;">${esc(i.assignee||'—')}</p>`}</div></div>
            <div><label>Due Date</label>
              ${can('edit')?`<input id="f-due" type="date" value="${esc(i.dueDate||'')}" style="margin-top:5px;"/>`:
              `<p style="font-size:14px;margin-top:5px;">${fmtDate(i.dueDate)}</p>`}</div>
            <div><label>Description</label>
              ${can('edit')?`<textarea id="f-desc" rows="4" placeholder="Describe this integration…" style="margin-top:5px;">${esc(i.description||'')}</textarea>`:
              `<p style="font-size:14px;line-height:1.55;margin-top:5px;color:var(--ink-2);">${esc(i.description||'—')}</p>`}</div>
            <div><label>Next Action</label>
              ${can('edit')?`<textarea id="f-next" rows="2" placeholder="What's the next step?" style="margin-top:5px;">${esc(i.nextAction||'')}</textarea>`:
              `<p style="font-size:14px;margin-top:5px;color:var(--ink-2);">${esc(i.nextAction||'—')}</p>`}</div>
            ${can('edit')?`<div style="display:flex;flex-direction:column;gap:8px;padding-top:4px;">
              <button data-act="save-integ" data-cid="${c.id}" data-iid="${i.id}" class="btn btn-primary" style="width:100%;">${IC.check} Save Changes</button>
              ${i.status!=='Completed'?`<button data-act="mark-complete" data-cid="${c.id}" data-iid="${i.id}" class="btn btn-secondary" style="width:100%;color:var(--success);border-color:var(--success-bd);">${IC.check} Mark as Complete</button>`:''}
              ${can('admin')?`<button data-act="delete-integ" data-cid="${c.id}" data-iid="${i.id}" class="btn btn-danger" style="font-size:12px;">${IC.trash} Delete Integration</button>`:''}
            </div>`:''}
          </div>
        </div>
      </div>
      <!-- Milestones -->
      <div class="card">
        <div class="card-body">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <h3 class="t-h3">Milestones</h3>
            ${can('edit')?`<button data-act="add-milestone-btn" data-cid="${c.id}" data-iid="${i.id}" class="btn btn-secondary btn-sm">${IC.plus} Add</button>`:''}
          </div>
          ${(i.milestones||[]).length?`<div style="display:flex;flex-direction:column;gap:8px;">
            ${(i.milestones||[]).map(ms=>{
              const mc={Achieved:'var(--success)',Missed:'var(--danger)',Pending:'var(--warning)'}[ms.status]||'var(--muted)';
              return`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);">
                <div style="width:8px;height:8px;border-radius:50%;background:${mc};flex-shrink:0;"></div>
                <div style="flex:1;min-width:0;">
                  <div style="font-size:13px;font-weight:600;">${esc(ms.name)}</div>
                  <div style="font-size:11.5px;color:var(--muted);">${ms.owner?`${esc(ms.owner)} · `:''}${ms.dueDate?fmtDate(ms.dueDate):'No date'}</div>
                </div>
                <span class="badge ${ms.status==='Achieved'?'badge-green':ms.status==='Missed'?'badge-red':'badge-amber'}" style="font-size:10.5px;">${ms.status}</span>
                ${can('edit')?`<button data-act="edit-milestone-btn" data-cid="${c.id}" data-iid="${i.id}" data-mid="${ms.id}" class="btn btn-ghost btn-sm" style="color:var(--muted);">${IC.edit}</button>`:''}
                ${can('admin')?`<button data-act="delete-milestone" data-cid="${c.id}" data-iid="${i.id}" data-mid="${ms.id}" class="btn btn-ghost btn-sm" style="color:var(--danger);">${IC.trash}</button>`:''}
              </div>`;}).join('')}
          </div>`:emptyState('chart','No milestones','Add key checkpoints for this integration')}
        </div>
      </div>
    </div>
    <!-- Timeline card -->
    <div class="card">
      <div class="card-body">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <h3 class="t-h3">Timeline <span style="font-weight:400;color:var(--muted);font-size:13px;">(${i.timeline?.length||0})</span></h3>
        </div>
        ${can('edit')?`<div style="margin-bottom:20px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);">
          <label style="margin-bottom:8px;display:block;">Add Update</label>
          <textarea id="tl-input" rows="3" placeholder="What happened? What's the current status?" style="margin-bottom:10px;"></textarea>
          <button data-act="add-timeline" data-cid="${c.id}" data-iid="${i.id}" class="btn btn-accent btn-sm" style="width:100%;border-radius:var(--pill);">${IC.plus} Add Update</button>
        </div>`:''}
        <div style="max-height:520px;overflow-y:auto;padding-right:4px;">
          ${!(i.timeline?.length)?emptyState('clock','No updates yet','Add the first update to start tracking progress.'):
          i.timeline.map((t,idx,arr)=>{
            const isEditing=S.editingTimelineId===t.id;
            const hasHistory=t.edits&&t.edits.length>0;
            const isExpanded=S.expandedHistory.has(t.id);

  </div>
</div>`;
}

          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;">

            ${ragBadge(rag)}
          </div>
          ${c.description?`<div style="font-size:12px;color:var(--muted);margin-bottom:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(c.description)}</div>`:''}
          <div style="display:flex;flex-direction:column;gap:4px;font-size:12.5px;color:var(--muted);">
            <span class="t-mono" style="font-weight:600;color:var(--ink-2);">${t.totalHours.toFixed(1)} hours</span>
            ${can('admin')&&c.manDayRate?`<span>${currencySymbol(c)}${c.manDayRate.toLocaleString('en-IN')}/day rate</span>`:''}
            ${t.hasBucket?`<span style="font-weight:600;color:${t.balanceAvailable>2?'var(--success)':'var(--danger)'};">${t.balanceAvailable.toFixed(1)} / ${t.totalAvailableHours.toFixed(1)} hrs available</span>`:''}
          </div>
        </div>
      </div>`;
    }).join(''):emptyState('hours','No AMS clients yet','Add a client to start tracking support hours')}
  </div>
</div>`;
}

// ─── AMS CLIENT DETAIL ────────────────────────────────────────────
function renderAmsClientDetail(clientId){
  const c=S.clients.find(x=>x.id===clientId);
  if(!c)return`<div class="page"><div class="empty-state">Client not found</div></div>`;
  const t=amsTotals(c,S.amsFrom,S.amsTo);
  const sorted=[...t.log].sort((a,b)=>entryDate(b).localeCompare(entryDate(a)));
  const COLS=['#','Date','Due','By','Module','Project','Description','Type','Level','Deps','Status','RAG','Solution','Mode','Hrs'];
  const statusColor={'Open':'var(--info)','In Progress':'var(--warning)','Closed':'var(--success)'};
  return`<div class="page fade" style="max-width:none;">
  <div class="crumbs">
    <button data-act="nav-ams">AMS & Support</button><span class="sep">›</span>
    <span style="color:var(--ink-2);font-weight:600;">${esc(c.name)}</span>
  </div>
  <div class="page-hdr">
    <div>
      <div style="display:flex;align-items:center;gap:12px;">
        <h1 class="t-h1">${esc(c.name)}</h1>
        ${(()=>{const r=amsClientRag(c);return r?ragBadge(r):''})()}
      </div>
      ${c.description?`<p style="font-size:14px;color:var(--muted);margin-top:4px;">${esc(c.description)}</p>`:''}
    </div>
    ${can('admin')?`<div style="display:flex;gap:8px;">
      <button data-act="edit-ams-client" data-id="${c.id}" class="btn btn-secondary btn-sm">${IC.edit} Edit</button>
      <button data-act="delete-ams-client" data-id="${c.id}" class="btn btn-ghost btn-sm btn-danger">${IC.trash}</button>
    </div>`:''}
  </div>
  ${can('edit')?`<div style="margin-bottom:20px;"><button data-act="modal-open" data-modal="add-ams-entry" data-cid="${c.id}" class="btn btn-accent" style="border-radius:var(--pill);">${IC.plus} Add Entry</button></div>`:''}
  ${can('admin')&&t.hasRate?`<div class="card" style="margin-bottom:20px;">
    <div class="card-body">
      <div style="display:flex;flex-wrap:wrap;align-items:flex-end;gap:12px;margin-bottom:18px;">
        <div><label>From</label><input id="ams-from" data-act="ams-range" type="date" value="${esc(S.amsFrom)}" style="margin-top:5px;width:160px;"/></div>
        <div><label>To</label><input id="ams-to" data-act="ams-range" type="date" value="${esc(S.amsTo)}" style="margin-top:5px;width:160px;"/></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${[['This Month','this-month'],['Last Month','last-month'],['This Quarter','this-quarter'],['All Time','all-time']].map(([l,k])=>`<button data-act="ams-quick" data-range="${k}" class="chip" style="${S.amsQuick===k?'border-color:var(--accent);color:var(--accent);font-weight:700;':''}">${l}</button>`).join('')}
        </div>
        <div style="display:flex;gap:6px;margin-left:auto;">
          <button data-act="exp-ams-activity" data-cid="${c.id}" class="btn btn-secondary btn-sm">📋 Activity Report</button>
          <button data-act="exp-excel" data-etype="ams" data-cid="${c.id}" class="btn btn-secondary btn-sm">📊 Excel</button>
          <button data-act="open-import-ams" data-cid="${c.id}" class="btn btn-secondary btn-sm">⬆ Import</button>
        </div>
      </div>
      ${t.hasBucket?`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;">
        ${[
          {l:'Total Available',v:`${t.totalAvailableHours.toFixed(1)} hrs`,c:'var(--muted)'},
          {l:'Consumed (All-time)',v:`${t.consumedAllTime.toFixed(1)} hrs`,c:'var(--ink-2)'},
          {l:'Balance Available',v:`${t.balanceAvailable.toFixed(1)} hrs`,c:t.balanceAvailable>2?'var(--success)':'var(--danger)'},
        ].map(m=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;">
          <div class="t-num-lg" style="color:${m.c};">${m.v}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;">${m.l}</div>
        </div>`).join('')}
      </div>`:''}
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
        ${[
          {l:'Hours This Period',v:`${t.totalHours.toFixed(1)} hrs`,c:'var(--ink-2)'},
          {l:'Day Rate',v:`${currencySymbol(c)}${(c.manDayRate||0).toLocaleString('en-IN')}`,c:'var(--ink-2)'},
          {l:'Billable Amount',v:`${currencySymbol(c)}${(t.totalAmount||0).toLocaleString('en-IN',{maximumFractionDigits:0})}`,c:'var(--accent)'},
        ].map(m=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);border-top:3px solid ${m.c};padding:14px 16px;">
          <div class="t-num-lg t-mono" style="color:${m.c};">${m.v}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;">${m.l}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>`:''}
  <div class="card">
    <div style="overflow-x:auto;">
      <table class="tbl tbl-compact" style="min-width:1400px;">
        <thead><tr>${COLS.map((h,ci)=>`<th style="${ci===0?'width:36px;text-align:center;':''}${ci===14?'text-align:right;':''}">${h}</th>`).join('')}${can('edit')?`<th>Actions</th>`:''}</tr></thead>
        <tbody>
          ${sorted.length?sorted.map((e,idx)=>{
            const isExpanded=S.expandedAmsHistory.has(e.id);const hasHistory=e.edits&&e.edits.length>0;
            return`<tr>
              <td style="text-align:center;font-size:12px;color:var(--muted);font-weight:600;">${sorted.length-idx}</td>
              <td style="white-space:nowrap;font-size:12.5px;">${fmtDate(entryDate(e))}</td>
              <td style="white-space:nowrap;font-size:12.5px;${e.dueDate&&e.dueDate<todayStr()&&(e.entryStatus||'Open')!=='Closed'?'color:var(--danger);font-weight:600;':''}">${e.dueDate?fmtDate(e.dueDate):'—'}</td>
              <td style="font-size:12.5px;">${esc(entryRaisedBy(e))}</td>
              <td style="font-size:12.5px;">${esc(e.module||'—')}</td>
              <td style="font-size:12.5px;">${esc(e.project||'—')}</td>
              <td style="font-size:12.5px;max-width:180px;">
                <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(e.description||'')}">${esc(e.description||'—')}</div>
                ${hasHistory?`<button data-act="toggle-ams-history" data-eid="${e.id}" style="font-size:10px;color:var(--warning);font-weight:600;">✎ edited — ${isExpanded?'hide':'view'}</button>`:''}
                ${isExpanded&&hasHistory?`<div style="margin-top:4px;font-size:11px;color:var(--muted);">${[...e.edits].reverse().map(h=>`<div>${fmtDate(h.editedAt)}: ${esc(h.description||'—')}</div>`).join('')}</div>`:''}
              </td>
              <td><span style="font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);padding:2px 7px;border-radius:var(--r-xs);color:var(--ink-3);">${esc(entryType(e))}</span></td>
              <td style="font-size:12px;color:var(--ink-3);">${esc(e.queryLevel||'—')}</td>
              <td style="font-size:12px;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(e.dependencies||'—')}</td>
              <td><span style="font-size:11.5px;font-weight:600;color:${statusColor[e.entryStatus||'Open']||'var(--ink-3)'};">${e.entryStatus||'Open'}</span></td>
              <td>${e.ragStatus?ragBadge(e.ragStatus):`<span style="color:var(--muted);font-size:12px;">—</span>`}</td>
              <td style="font-size:12px;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(e.solution||'—')}</td>
              <td style="font-size:12px;color:var(--muted);">${esc(e.modeOfSupport||'—')}</td>
              <td style="text-align:right;font-family:var(--mono);font-size:13px;font-weight:600;">${Number(e.hours||0).toFixed(1)}</td>
              ${can('edit')?`<td style="white-space:nowrap;"><div style="display:flex;gap:4px;">
                <button data-act="edit-ams-entry" data-cid="${c.id}" data-eid="${e.id}" class="btn btn-ghost btn-sm" style="height:24px;padding:0 8px;font-size:11px;">${IC.edit}</button>
                ${can('admin')?`<button data-act="delete-ams-entry" data-cid="${c.id}" data-eid="${e.id}" class="btn btn-ghost btn-sm" style="height:24px;padding:0 8px;font-size:11px;color:var(--danger);">${IC.trash}</button>`:''}
              </div></td>`:''}</tr>`;
          }).join(''):`<tr><td colspan="${COLS.length+(can('edit')?1:0)}">${emptyState('hours','No entries yet','Add the first entry to start tracking')}</td></tr>`}
        </tbody>
      </table>
    </div>
  </div>
</div>`;
}

function addLogoToDoc(doc,x,y,maxH){const w=maxH*(315/94);try{doc.addImage(KOGNOZ_LOGO,'PNG',x,y-(maxH*0.75),w,maxH);}catch(e){}}

async function exportPptx(clientId){
  const c=S.clients.find(x=>x.id===clientId);if(!c)return;
  showToast('Generating PPTX…','info');
  try{
    const pptx=new PptxGenJS();pptx.layout='LAYOUT_WIDE';
    const NV='0F172A',AC='0E7490';
    const s1=pptx.addSlide();s1.background={color:NV};
    s1.addText('INTEGRATION STATUS REPORT',{x:.5,y:1,w:12.5,h:.4,fontSize:9,color:'94a3b8',align:'center',charSpacing:4});
    s1.addText(c.name,{x:.5,y:1.6,w:12.5,h:1.2,fontSize:40,color:'FFFFFF',bold:true,align:'center'});
    try{s1.addImage({data:KOGNOZ_LOGO,x:5.15,y:2.9,w:2.8,h:0.84});}catch(e){}
    s1.addShape(pptx.ShapeType.rect,{x:5.65,y:3.55,w:2,h:.04,fill:{color:AC},line:{type:'none'}});
    s1.addText(new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'}),{x:.5,y:6.7,w:12.5,h:.3,fontSize:10,color:'475569',align:'center'});
    const s2=pptx.addSlide();s2.background={color:'F8FAFC'};
    s2.addShape(pptx.ShapeType.rect,{x:0,y:0,w:13.3,h:.7,fill:{color:NV},line:{type:'none'}});
    try{s2.addImage({data:KOGNOZ_LOGO,x:.2,y:.05,w:1.2,h:0.36});}catch(e){}
    s2.addText('Integration Summary',{x:1.6,y:.1,w:11,h:.5,fontSize:15,color:'FFFFFF',bold:true});
    s2.addText(c.name,{x:.4,y:.1,w:12.5,h:.5,fontSize:11,color:'94a3b8',align:'right'});
    const sg={};c.integrations.forEach(i=>sg[i.status]=(sg[i.status]||0)+1);
    [{l:'Total',v:c.integrations.length,col:NV},{l:'In Progress',v:sg['In Progress']||0,col:SHEX['In Progress']},{l:'At Risk',v:sg['At Risk']||0,col:SHEX['At Risk']},{l:'Completed',v:sg['Completed']||0,col:SHEX['Completed']},{l:'On Hold',v:(sg['On Hold — Internal']||0)+(sg['On Hold — Client']||0),col:SHEX['On Hold — Internal']}]
    .forEach(({l,v,col},i)=>{const x=.4+i*2.5;s2.addShape(pptx.ShapeType.rect,{x,y:.85,w:2.2,h:.85,fill:{color:col},line:{type:'none'}});s2.addText(String(v),{x,y:.88,w:2.2,h:.48,fontSize:22,color:'FFFFFF',bold:true,align:'center'});s2.addText(l,{x,y:1.36,w:2.2,h:.28,fontSize:7.5,color:'FFFFFF',align:'center'});});
    const rows=[['Integration','Status','Assignee','Due Date'].map(t=>({text:t,options:{bold:true,fill:{color:NV},color:'FFFFFF',fontSize:9}})),
      ...c.integrations.map((i,idx)=>[
        {text:i.name,options:{fontSize:8.5,color:'1f2937',fill:{color:idx%2?'FFFFFF':'F8FAFC'}}},
        {text:i.status,options:{fontSize:8.5,bold:true,color:SHEX[i.status]||'64748b',fill:{color:idx%2?'FFFFFF':'F8FAFC'}}},
        {text:i.assignee||'—',options:{fontSize:8.5,color:'4b5563',fill:{color:idx%2?'FFFFFF':'F8FAFC'}}},
        {text:i.dueDate?fmtDate(i.dueDate):'—',options:{fontSize:8.5,color:'4b5563',fill:{color:idx%2?'FFFFFF':'F8FAFC'}}},
      ])];
    s2.addTable(rows,{x:.3,y:1.9,w:12.7,colW:[5.2,2.2,2.8,2.5],border:{type:'solid',color:'e2e8f0',pt:.5}});
    const CHARS_PER_LINE=95,LINE_H=0.15;

function exportExcel(type,clientId){
  if(typeof XLSX==='undefined'){showToast('Excel export not available','error');return;}
  const c=S.clients.find(x=>x.id===clientId);if(!c)return;
  let ws,data,headers,filename;
  if(type==='integrations'){headers=['Integration','Status','Assignee','Due Date','Description','Next Action','Last Update'];data=(c.integrations||[]).map(i=>[i.name||'',i.status||'',i.assignee||'',i.dueDate?fmtDate(i.dueDate):'',i.description||'',i.nextAction||'',(i.timeline||[])[0]?.date?fmtDate((i.timeline||[])[0].date):'']);filename=`${c.name}_Integrations.xlsx`;}
  else if(type==='ams'){headers=['#','Date Raised','Due Date','Raised By','Module','Project','Description','Type','Query Level','Entry Status','RAG','Mode','Hours'];data=(c.workLog||[]).map((e,i)=>[i+1,fmtDate(entryDate(e)),e.dueDate?fmtDate(e.dueDate):'',entryRaisedBy(e),e.module||'',e.project||'',e.description||'',entryType(e),e.queryLevel||'',e.entryStatus||'Open',e.ragStatus||'',e.modeOfSupport||'',Number(e.hours||0).toFixed(1)]);filename=`${c.name}_AMS_Entries.xlsx`;}
  else if(type==='impl'){headers=['Module','Phase','Status','Assignee','Start Date','Target Date','Current Activity','Next Action','Updates Count'];data=(c.modules||[]).flatMap(m=>(m.phases||[]).map(ph=>[m.name,ph.name,ph.status||'',ph.assignee||'',ph.startDate?fmtDate(ph.startDate):'',ph.targetDate?fmtDate(ph.targetDate):'',ph.currentActivity||'',ph.nextAction||'',(ph.updates||[]).length]));filename=`${c.name}_Implementation.xlsx`;}
  else if(type==='milestones'){headers=['Integration','Milestone','Status','Due Date','Owner','Notes'];data=(c.integrations||[]).flatMap(i=>(i.milestones||[]).map(ms=>[i.name,ms.name,ms.status,ms.dueDate?fmtDate(ms.dueDate):'',ms.owner||'',ms.notes||'']));filename=`${c.name}_Milestones.xlsx`;}
  ws=XLSX.utils.aoa_to_sheet([headers,...(data||[])]);
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Data');
  XLSX.writeFile(wb,filename);showToast('Excel downloaded ✓');
}

// ─── EVENT HANDLERS ───────────────────────────────────────────────
function handleClick(e){
  const btn=e.target.closest('[data-act]');
  const actEl=btn||e.target;
  const act=actEl.dataset?.act||'';
  if(!act)return;
  const d=actEl.dataset;

  // Toast undo
  if(act==='exec-undo'){execUndo();return;}

  // Cmd palette
  if(act==='cmdp-open'){S.cmdPaletteOpen=true;S.cmdQuery='';render();setTimeout(()=>document.getElementById('cmdp-input')?.focus(),50);return;}
  if(act==='cmdp-input')return;
  if(act==='cmdp-go'){const r=_cmdpResults[parseInt(d.idx)];if(r){S.cmdPaletteOpen=false;navigate(r.view,r.params);}return;}
  if(e.target.id==='cmdp-overlay'||e.target.closest('#cmdp-overlay')===e.target.closest('.modal-overlay')){
    if(e.target.id==='cmdp-overlay'){S.cmdPaletteOpen=false;render();return;}
  }

  // Sidebar nav
  if(act==='toggle-sidebar'){S.sidebarCollapsed=!S.sidebarCollapsed;try{localStorage.setItem('itk_sb_collapsed',S.sidebarCollapsed?'1':'0');}catch(_){}render();return;}
  if(act==='toggle-dark'){S.darkMode=!S.darkMode;document.documentElement.classList.toggle('dark',S.darkMode);try{localStorage.setItem('itk_dark',S.darkMode?'1':'0');}catch(_){}render();return;}
  if(act==='nav-dashboard'){navigate('dashboard');return;}
  if(act==='nav-clients'){navigate('clients');return;}
  if(act==='nav-impl'){navigate('impl-clients');return;}
  if(act==='nav-ams'){navigate('ams-clients');return;}
  if(act==='nav-admin'){navigate('admin');return;}
  if(act==='logout'){S.user=null;S.sessionToken=null;clearSession();S.view='login';render();return;}
  if(act==='open-profile'){S.modal={type:'my-profile'};render();return;}

  // Navigation shortcuts
  if(act==='open-client'){navigate('client-detail',{clientId:d.id});return;}
  if(act==='open-integ'){navigate('integ-detail',{clientId:d.cid,integId:d.iid});return;}
  if(act==='open-impl-client'){navigate('impl-client-detail',{clientId:d.id});return;}
  if(act==='open-ams-client'){navigate('ams-client-detail',{clientId:d.id});return;}
  if(act==='open-impl-phase'){navigate('impl-phase-detail',{clientId:d.cid,moduleId:d.mid,phase:d.phase});return;}

  // Modal
  if(act==='modal-open'){
    const mt=d.modal;
    if(mt==='add-client')S.modal={type:'add-client'};
    else if(mt==='add-integ')S.modal={type:'add-integ',cid:d.cid||''};
    else if(mt==='add-user')S.modal={type:'add-user'};
    else if(mt==='bulk-import-users')S.modal={type:'bulk-import-users',csvText:'',csvRows:[]};
    else if(mt==='add-impl-client')S.modal={type:'add-impl-client'};
    else if(mt==='add-impl-module')S.modal={type:'add-impl-module',cid:d.cid};
    else if(mt==='add-ams-client')S.modal={type:'add-ams-client'};
    else if(mt==='add-ams-entry')S.modal={type:'add-ams-entry',cid:d.cid};
    render();return;
  }
  if(act==='modal-close'){S.modal=null;render();return;}

  // Admin tab
  if(act==='admin-tab'){S.adminTab=d.tab;render();return;}

  // Filter / search / sort
  if(act==='filter'){S.filter=d.filter;render();return;}
  if(act==='sort'){const k=d.key;if(S.sort.key===k)S.sort.dir=S.sort.dir==='asc'?'desc':'asc';else{S.sort.key=k;S.sort.dir='asc';}render();return;}

  // Timeline
  if(act==='edit-timeline'){S.editingTimelineId=d.tid;render();return;}
  if(act==='cancel-edit-timeline'){S.editingTimelineId=null;render();return;}
  if(act==='toggle-history'){const tid=d.tid;if(S.expandedHistory.has(tid))S.expandedHistory.delete(tid);else S.expandedHistory.add(tid);render();return;}
  if(act==='toggle-ams-history'){const eid=d.eid;if(S.expandedAmsHistory.has(eid))S.expandedAmsHistory.delete(eid);else S.expandedAmsHistory.add(eid);render();return;}
  if(act==='copy-update'){navigator.clipboard?.writeText(d.text||'').then(()=>showToast('Copied ✓'));return;}

  // Bulk impl
  if(act==='toggle-bulk-impl'){S.bulkImplMode=!S.bulkImplMode;S.bulkImplCid=S.bulkImplMode?d.cid:null;S.bulkSelected=new Set();render();return;}
  if(act==='toggle-bulk-phase'){const k=`${d.mid}:${d.phase}`;if(S.bulkSelected.has(k))S.bulkSelected.delete(k);else S.bulkSelected.add(k);render();return;}

  // Exports
  if(act==='exp-pptx'){exportPptx(d.id);return;}
  if(act==='exp-pdf'){exportPdf(d.id);return;}
  if(act==='exp-impl-pdf'){exportImplPdf(d.cid);return;}
  if(act==='exp-ams-activity'){exportAmsActivityPdf(d.cid);return;}
  if(act==='exp-excel'){exportExcel(d.etype,d.cid);return;}
  if(act==='portfolio-export'){S.modal={type:'portfolio-export'};render();return;}

  // Import
  if(act==='open-import-integ'){const c=S.clients.find(x=>x.id===d.cid);S.modal={type:'import-integrations',cid:d.cid,existingIntegs:c?.integrations||[],csvText:'',csvRows:[]};render();return;}
  if(act==='open-import-ams'){S.modal={type:'import-ams-entries',cid:d.cid,csvText:'',csvRows:[]};render();return;}
  if(act==='preview-users-csv'){const t=document.getElementById('bulk-csv')?.value||'';const rows=parseUsersCsv(t);S.modal={...S.modal,csvText:t,csvRows:rows};render();return;}
  if(act==='preview-ams-csv'){const t=document.getElementById('bulk-csv')?.value||'';const rows=parseAmsEntriesCsv(t);S.modal={...S.modal,csvText:t,csvRows:rows};render();return;}
  if(act==='preview-integ-csv'){const c=S.clients.find(x=>x.id===S.modal?.cid);const t=document.getElementById('bulk-csv')?.value||'';const rows=parseIntegrationsCsv(t,c?.integrations||[]);S.modal={...S.modal,csvText:t,csvRows:rows};render();return;}
  if(act==='download-user-template'){const hdr='username,full_name,role,email,password\npriya.s,Priya S,editor,priya@kognoz.in,Kognoz@123';const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(hdr);a.download='users_template.csv';a.click();return;}
  if(act==='download-ams-template'){const hdr='date_raised,due_date,raised_by,module,project,description,type,query_level,entry_status,mode_of_support,hours\n2024-01-15,,John Doe,Core HR,,Payroll mapping issue,Bug Fix,L2 - Medium,Open,Online / Remote,1.5';const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(hdr);a.download='ams_entries_template.csv';a.click();return;}
  if(act==='download-integ-template'){const hdr='name,status,assignee,due_date,description,next_action\nDarwinbox → SAP SF,In Progress,Priya S,2024-03-31,Core employee sync,Complete field mapping';const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(hdr);a.download='integrations_template.csv';a.click();return;}

  // AMS quick ranges
  if(act==='ams-quick'){
    const now=new Date();const k=d.range;S.amsQuick=k;
    if(k==='this-month'){const m=now.getMonth(),y=now.getFullYear();S.amsFrom=`${y}-${String(m+1).padStart(2,'0')}-01`;S.amsTo=todayStr();}
    else if(k==='last-month'){const d2=new Date(now.getFullYear(),now.getMonth(),0);const s=new Date(d2.getFullYear(),d2.getMonth(),1);S.amsFrom=s.toISOString().slice(0,10);S.amsTo=d2.toISOString().slice(0,10);}
    else if(k==='this-quarter'){const m=now.getMonth(),y=now.getFullYear();const qm=Math.floor(m/3)*3;S.amsFrom=`${y}-${String(qm+1).padStart(2,'0')}-01`;S.amsTo=todayStr();}
    else{S.amsFrom='';S.amsTo='';}
    render();return;
  }

  // Edit AMS client
  if(act==='edit-ams-client'){const c=S.clients.find(x=>x.id===d.id);if(!c)return;S.modal={type:'edit-ams-client',cid:c.id,description:c.description,manDayRate:c.manDayRate,totalAvailableHours:c.totalAvailableHours,currency:c.currency||'INR'};render();return;}
  if(act==='delete-ams-client'){
    const c=S.clients.find(x=>x.id===d.id);if(!c)return;
    const snap=JSON.parse(JSON.stringify(S.clients));
    S.clients=S.clients.map(x=>x.id===c.id?{...x,workLog:undefined,manDayRate:undefined,totalAvailableHours:undefined,currency:undefined}:x).filter(x=>!(x.id===c.id&&!(x.integrations||[]).length&&x.modules===undefined));
    saveClients(`Remove AMS client: ${c.name}`).then(()=>showToast(`AMS removed: ${c.name}`,'warn')).catch(err=>{showToast(err.message,'error');S.clients=snap;});
    navigate('ams-clients');return;
  }

  // Edit AMS entry
  if(act==='edit-ams-entry'){
    const c=S.clients.find(x=>x.id===d.cid);const e=c?.workLog?.find(x=>x.id===d.eid);if(!c||!e)return;
    S.modal={type:'edit-ams-entry',cid:c.id,eid:e.id,dateRaised:entryDate(e),dueDate:e.dueDate||'',raisedBy:entryRaisedBy(e),module:e.module||'',project:e.project||'',description:e.description||'',etype:entryType(e),queryLevel:e.queryLevel||AMS_QUERY_LEVELS[0],entryStatus:e.entryStatus||'Open',modeOfSupport:e.modeOfSupport||AMS_MODES[0],ragStatus:e.ragStatus||'',dependencies:e.dependencies||'',solution:e.solution||'',hours:e.hours||''};
    render();return;
  }
  if(act==='delete-ams-entry'){
    if(!can('admin'))return;
    const c=S.clients.find(x=>x.id===d.cid);if(!c)return;
    const snap=JSON.stringify(c.workLog);
    const removed=c.workLog.find(x=>x.id===d.eid);
    c.workLog=c.workLog.filter(x=>x.id!==d.eid);
    render();
    scheduleUndo(`Deleted entry`,()=>{c.workLog=JSON.parse(snap);saveClients('Restore AMS entry').then(()=>render());});
    saveClients(`Delete AMS entry`).catch(err=>{showToast(err.message,'error');c.workLog=JSON.parse(snap);render();});
    return;
  }

  // Mark integ complete
  if(act==='mark-complete'){
    const c=S.clients.find(x=>x.id===d.cid);const i=c?.integrations.find(x=>x.id===d.iid);if(!c||!i)return;
