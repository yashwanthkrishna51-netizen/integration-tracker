<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>IntegTrack — Kognoz</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<style>
[data-act]{cursor:pointer}
.fade{animation:fi .15s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
<div id="app"></div>
<script>
// ─── STATE ────────────────────────────────────────────────────────
const S={user:null,clients:[],users:[],shas:{clients:null,users:null},sessionToken:null,view:'login',params:{},adminTab:'clients',filter:'all',search:'',modal:null,toast:null};

// ─── CONSTANTS ────────────────────────────────────────────────────
const STATUSES=['Not Started','In Progress','At Risk','On Hold','Completed'];
const ROLES=['viewer','editor','admin'];
const SBG={'Completed':'bg-green-100 text-green-700 border border-green-200','In Progress':'bg-blue-100 text-blue-700 border border-blue-200','At Risk':'bg-red-100 text-red-700 border border-red-200','On Hold':'bg-amber-100 text-amber-700 border border-amber-200','Not Started':'bg-gray-100 text-gray-500 border border-gray-200'};
const SDOT={'Completed':'bg-green-500','In Progress':'bg-blue-500','At Risk':'bg-red-500','On Hold':'bg-amber-400','Not Started':'bg-gray-400'};
const SHEX={'Completed':'22c55e','In Progress':'3b82f6','At Risk':'ef4444','On Hold':'f59e0b','Not Started':'9ca3af'};
const SRGB={'Completed':[34,197,94],'In Progress':[59,130,246],'At Risk':[239,68,68],'On Hold':[245,158,11],'Not Started':[156,163,175]};
const NAVY='1e3a8a';

// ─── UTILS ────────────────────────────────────────────────────────
async function sha256(str){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(s){if(!s)return'—';try{return new Date(s).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}catch{return s;}}
function can(p){if(!S.user)return false;const r={admin:3,editor:2,viewer:1};return(r[S.user.role]||0)>=(r[p]||0);}
function navigate(view,params={}){S.view=view;S.params=params;S.filter='all';S.search='';S.modal=null;render();}

let _tt;
function showToast(msg,type='success'){
  S.toast={msg,type};
  const el=document.getElementById('toast');
  const c={success:'bg-green-600',error:'bg-red-600',info:'bg-blue-700',warn:'bg-amber-600'};
  if(el){el.className=`fixed bottom-5 right-5 z-[100] ${c[type]||c.info} text-white text-sm font-medium px-4 py-3 rounded-xl shadow-xl fade`;el.textContent=msg;el.style.display='block';}
  else{const d=document.createElement('div');d.id='toast';d.className=`fixed bottom-5 right-5 z-[100] ${c[type]||c.info} text-white text-sm font-medium px-4 py-3 rounded-xl shadow-xl fade`;d.textContent=msg;document.body.appendChild(d);}
  if(_tt)clearTimeout(_tt);_tt=setTimeout(()=>{const x=document.getElementById('toast');if(x)x.style.display='none';},3500);
}

// ─── API ──────────────────────────────────────────────────────────
async function apiRead(path){
  const r=await fetch(`/api/read?path=${encodeURIComponent(path)}`,{headers:{'x-session-token':S.sessionToken||''}});
  if(!r.ok)throw new Error(`Read ${r.status}`);
  const d=await r.json();
  if(d.message&&!d.content)throw new Error(d.message);
  return{content:JSON.parse(atob(d.content.replace(/\n/g,''))),sha:d.sha};
}
async function apiWrite(path,obj,sha,msg){
  const r=await fetch('/api/write',{method:'POST',headers:{'Content-Type':'application/json','x-session-token':S.sessionToken||''},body:JSON.stringify({path,content:JSON.stringify(obj,null,2),sha,message:msg})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||e.message||`Write ${r.status}`);}
  const d=await r.json();return d.sha||d.content?.sha;
}
async function saveClients(msg){S.shas.clients=await apiWrite('data/clients.json',S.clients,S.shas.clients,msg||'Update clients');}
async function saveUsers(msg){S.shas.users=await apiWrite('data/users.json',S.users,S.shas.users,msg||'Update users');}

// ─── HELPERS ──────────────────────────────────────────────────────
function sbadge(s){return`<span class="inline-flex text-xs font-semibold px-2.5 py-0.5 rounded-full ${SBG[s]||SBG['Not Started']}">${esc(s)}</span>`;}
function sBar(integs){if(!integs.length)return'';const c={};integs.forEach(i=>c[i.status]=(c[i.status]||0)+1);return Object.entries(c).map(([s,n])=>`<div class="h-1.5 ${SDOT[s]||'bg-gray-400'} rounded" style="width:${Math.round(n/integs.length*100)}%"></div>`).join('');}
function sCounts(integs){const c={};integs.forEach(i=>c[i.status]=(c[i.status]||0)+1);return Object.entries(c).map(([s,n])=>`<span class="flex items-center gap-1 text-xs text-gray-500"><span class="w-2 h-2 inline-block rounded-full ${SDOT[s]||'bg-gray-400'}"></span>${n} ${esc(s)}</span>`).join('');}

// ─── RENDER ───────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  if(S.view==='login'){app.innerHTML=renderLogin();return;}
  let content='';
  if(S.view==='clients')content=renderClientList();
  else if(S.view==='client-detail')content=renderClientDetail(S.params.clientId);
  else if(S.view==='integ-detail')content=renderIntegDetail(S.params.clientId,S.params.integId);
  else if(S.view==='admin')content=can('admin')?renderAdmin():`<div class="p-8 text-red-500">Access denied</div>`;
  app.innerHTML=`${renderNav()}<main class="pt-14 min-h-screen">${content}</main>${S.modal?renderModal():''}`;
}

function renderNav(){
  const al=v=>(S.view===v||(['clients','client-detail','integ-detail'].includes(S.view)&&v==='clients'))?'text-blue-900 font-semibold border-b-2 border-blue-900':'text-gray-500 hover:text-gray-800';
  return`<nav class="fixed top-0 inset-x-0 bg-white border-b border-gray-200 z-50 h-14">
  <div class="max-w-7xl mx-auto px-4 h-full flex items-center justify-between">
    <div class="flex items-center gap-6">
      <span class="font-bold text-blue-900 text-lg flex items-center gap-1.5">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>IntegTrack</span>
      <button data-act="nav-clients" class="${al('clients')} text-sm transition-colors pb-px">Clients</button>
      ${can('admin')?`<button data-act="nav-admin" class="${al('admin')} text-sm transition-colors pb-px">Admin</button>`:''}
    </div>
    <div class="flex items-center gap-3">
      <span class="text-sm text-gray-700 hidden sm:inline">${esc(S.user?.name)}</span>
      <span class="text-xs px-2 py-0.5 rounded-full font-medium ${S.user?.role==='admin'?'bg-purple-100 text-purple-700':S.user?.role==='editor'?'bg-blue-100 text-blue-700':'bg-gray-100 text-gray-600'} capitalize">${esc(S.user?.role)}</span>
      <button data-act="logout" class="text-xs text-gray-400 hover:text-red-500 transition-colors">Sign out</button>
    </div>
  </div>
</nav>`;
}

// ─── LOGIN ────────────────────────────────────────────────────────
function renderLogin(){
  return`<div class="min-h-screen bg-gradient-to-br from-blue-950 via-blue-900 to-indigo-900 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm fade">
    <div class="text-center mb-8">
      <div class="w-12 h-12 bg-blue-900 rounded-2xl flex items-center justify-center mx-auto mb-3">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </div>
      <h1 class="text-xl font-bold text-blue-900">IntegTrack</h1>
      <p class="text-xs text-gray-400 mt-0.5">Kognoz · Integration Management</p>
    </div>
    <div class="space-y-4">
      <div><label class="block text-xs font-medium text-gray-500 mb-1.5">Username</label>
        <input id="lu" type="text" autocomplete="username" placeholder="username" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
      <div><label class="block text-xs font-medium text-gray-500 mb-1.5">Password</label>
        <input id="lp" type="password" autocomplete="current-password" placeholder="••••••••" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
      <div id="lerr" class="hidden text-xs text-red-500 text-center bg-red-50 py-2 rounded-lg px-3"></div>
      <button data-act="login" class="w-full bg-blue-900 text-white font-semibold rounded-xl py-2.5 text-sm hover:bg-blue-800 transition-colors">Sign In</button>
    </div>
  </div>
</div>`;
}

// ─── CLIENT LIST ──────────────────────────────────────────────────
function renderClientList(){
  const q=S.search.toLowerCase();
  const fl=S.clients.filter(c=>c.name.toLowerCase().includes(q));
  const ti=S.clients.reduce((a,c)=>a+c.integrations.length,0);
  const ar=S.clients.reduce((a,c)=>a+c.integrations.filter(i=>i.status==='At Risk').length,0);
  const ip=S.clients.reduce((a,c)=>a+c.integrations.filter(i=>i.status==='In Progress').length,0);
  const co=S.clients.reduce((a,c)=>a+c.integrations.filter(i=>i.status==='Completed').length,0);
  return`<div class="max-w-7xl mx-auto px-4 py-6 fade">
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
    ${[['Clients',S.clients.length,'text-blue-900','bg-blue-50'],['Total Integrations',ti,'text-indigo-700','bg-indigo-50'],['In Progress',ip,'text-blue-600','bg-blue-50'],['At Risk',ar,'text-red-600','bg-red-50']].map(([l,v,tc,bg])=>`<div class="${bg} rounded-xl p-4"><div class="text-2xl font-bold ${tc}">${v}</div><div class="text-xs text-gray-500 mt-0.5">${l}</div></div>`).join('')}
  </div>
  <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
    <h1 class="text-xl font-bold text-gray-900">Clients</h1>
    <input id="search-inp" data-act="search" type="text" placeholder="Search clients…" value="${esc(S.search)}" class="border border-gray-200 rounded-xl px-3 py-2 text-sm w-52 focus:outline-none focus:ring-2 focus:ring-blue-400"/>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    ${fl.length?fl.map(c=>{
      const ar2=c.integrations.filter(i=>i.status==='At Risk').length;
      return`<div data-act="open-client" data-id="${c.id}" class="bg-white rounded-xl border border-gray-100 p-5 hover:shadow-md hover:border-blue-100 transition cursor-pointer">
        <div class="flex items-start justify-between mb-3">
          <div class="flex-1 min-w-0 pr-2"><div class="font-semibold text-gray-900">${esc(c.name)}</div>${c.description?`<div class="text-xs text-gray-400 mt-0.5 truncate">${esc(c.description)}</div>`:''}</div>
          <span class="text-2xl font-bold text-blue-900 opacity-60 shrink-0">${c.integrations.length}</span>
        </div>
        <div class="flex gap-1 mb-3 h-1.5">${sBar(c.integrations)}</div>
        <div class="flex flex-wrap gap-x-3 gap-y-1 mb-2">${sCounts(c.integrations)}</div>
        ${ar2>0?`<div class="mt-2 text-xs font-medium text-red-600 bg-red-50 rounded-lg px-2.5 py-1 inline-block">⚠ ${ar2} at risk</div>`:''}
      </div>`;
    }).join(''):`<div class="col-span-3 text-center py-16 text-gray-400">No clients match "${esc(S.search)}"</div>`}
  </div>
</div>`;
}

// ─── CLIENT DETAIL ────────────────────────────────────────────────
function renderClientDetail(clientId){
  const c=S.clients.find(x=>x.id===clientId);
  if(!c)return`<div class="p-8 text-gray-400">Client not found</div>`;
  const fl=S.filter==='all'?c.integrations:c.integrations.filter(i=>i.status===S.filter);
  return`<div class="max-w-7xl mx-auto px-4 py-6 fade">
  <div class="flex items-center gap-2 text-sm text-gray-400 mb-4">
    <button data-act="nav-clients" class="hover:text-blue-900">Clients</button><span>›</span>
    <span class="text-gray-900 font-medium">${esc(c.name)}</span>
  </div>
  <div class="flex flex-wrap items-start justify-between gap-4 mb-5">
    <div><h1 class="text-xl font-bold text-gray-900">${esc(c.name)}</h1>${c.description?`<p class="text-sm text-gray-400 mt-0.5">${esc(c.description)}</p>`:''}</div>
    <div class="relative group">
      <button class="flex items-center gap-1.5 bg-blue-900 text-white text-sm font-medium px-4 py-2 rounded-xl hover:bg-blue-800 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>Export ▾
      </button>
      <div class="absolute right-0 top-full mt-1 bg-white border border-gray-100 rounded-xl shadow-xl w-44 py-1 hidden group-hover:block z-10">
        <button data-act="exp-pptx" data-id="${c.id}" class="w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50">📊 PowerPoint</button>
        <button data-act="exp-pdf"  data-id="${c.id}" class="w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50">📄 PDF</button>
      </div>
    </div>
  </div>
  <div class="flex gap-2 overflow-x-auto pb-1 mb-5 items-center">
    ${['all',...STATUSES].map(st=>`<button data-act="filter" data-filter="${st}" class="whitespace-nowrap text-xs font-medium px-3 py-1.5 rounded-full transition ${S.filter===st?'bg-blue-900 text-white':'bg-white border border-gray-200 text-gray-600 hover:border-blue-300'}">${st==='all'?`All (${c.integrations.length})`:esc(st)+` (${c.integrations.filter(i=>i.status===st).length})`}</button>`).join('')}
    ${can('admin')?`<button data-act="modal-open" data-modal="add-integ" data-cid="${c.id}" class="whitespace-nowrap text-xs font-medium px-3 py-1.5 rounded-full bg-green-50 border border-green-200 text-green-700 hover:bg-green-100 ml-auto">+ Add Integration</button>`:''}
  </div>
  <div class="space-y-3">
    ${fl.length?fl.map(i=>{const last=i.timeline?.[0];return`<div data-act="open-integ" data-cid="${c.id}" data-iid="${i.id}" class="bg-white rounded-xl border border-gray-100 p-4 hover:shadow-md hover:border-blue-100 transition cursor-pointer">
      <div class="flex items-start justify-between gap-3">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap mb-1"><span class="font-medium text-gray-900">${esc(i.name)}</span>${sbadge(i.status)}</div>
          ${i.description?`<p class="text-xs text-gray-500 truncate mb-2">${esc(i.description)}</p>`:''}
          <div class="flex flex-wrap gap-4 text-xs text-gray-400">
            ${i.assignee?`<span>👤 ${esc(i.assignee)}</span>`:''}
            ${i.dueDate?`<span>📅 ${fmtDate(i.dueDate)}</span>`:''}
            ${i.timeline?.length?`<span>🕐 ${i.timeline.length} update${i.timeline.length>1?'s':''}</span>`:''}
          </div>
        </div>
        ${last?`<div class="hidden md:block text-xs text-gray-400 text-right max-w-xs shrink-0"><div class="font-medium text-gray-600 mb-1">Latest</div><div class="line-clamp-2">${esc(last.update)}</div><div class="mt-1">${fmtDate(last.date)}</div></div>`:''}
      </div>
    </div>`;}).join(''):`<div class="text-center py-12 text-gray-400 text-sm">No integrations match this filter</div>`}
  </div>
</div>`;
}

// ─── INTEG DETAIL ─────────────────────────────────────────────────
function renderIntegDetail(clientId,integId){
  const c=S.clients.find(x=>x.id===clientId);
  const i=c?.integrations.find(x=>x.id===integId);
  if(!c||!i)return`<div class="p-8 text-gray-400">Not found</div>`;
  return`<div class="max-w-6xl mx-auto px-4 py-6 fade">
  <div class="flex items-center gap-2 text-sm text-gray-400 mb-4">
    <button data-act="nav-clients" class="hover:text-blue-900">Clients</button><span>›</span>
    <button data-act="open-client" data-id="${c.id}" class="hover:text-blue-900">${esc(c.name)}</button><span>›</span>
    <span class="text-gray-900 font-medium truncate max-w-xs">${esc(i.name)}</span>
  </div>
  <div class="flex items-center gap-3 mb-6 flex-wrap">
    <h1 class="text-xl font-bold text-gray-900">${esc(i.name)}</h1>${sbadge(i.status)}
  </div>
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="bg-white rounded-2xl border border-gray-100 p-6">
      <h3 class="font-semibold text-gray-900 mb-4 text-sm">Details</h3>
      <div class="space-y-4">
        <div><label class="block text-xs font-medium text-gray-400 mb-1.5">Status</label>
          ${can('edit')?`<select id="f-status" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">${STATUSES.map(s=>`<option${s===i.status?' selected':''}>${s}</option>`).join('')}</select>`:sbadge(i.status)}
        </div>
        <div><label class="block text-xs font-medium text-gray-400 mb-1.5">Assignee</label>
          ${can('edit')?`<input id="f-assignee" type="text" value="${esc(i.assignee||'')}" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>`:
          `<p class="text-sm text-gray-700">${esc(i.assignee||'—')}</p>`}
        </div>
        <div><label class="block text-xs font-medium text-gray-400 mb-1.5">Due Date</label>
          ${can('edit')?`<input id="f-due" type="date" value="${esc(i.dueDate||'')}" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>`:
          `<p class="text-sm text-gray-700">${fmtDate(i.dueDate)}</p>`}
        </div>
        <div><label class="block text-xs font-medium text-gray-400 mb-1.5">Description</label>
          ${can('edit')?`<textarea id="f-desc" rows="4" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none">${esc(i.description||'')}</textarea>`:
          `<p class="text-sm text-gray-700 leading-relaxed">${esc(i.description||'—')}</p>`}
        </div>
        <div><label class="block text-xs font-medium text-gray-400 mb-1.5">Next Action</label>
          ${can('edit')?`<textarea id="f-next" rows="2" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none">${esc(i.nextAction||'')}</textarea>`:
          `<p class="text-sm text-gray-700">${esc(i.nextAction||'—')}</p>`}
        </div>
        ${can('edit')?`<button data-act="save-integ" data-cid="${c.id}" data-iid="${i.id}" class="w-full bg-blue-900 text-white font-semibold rounded-xl py-2.5 text-sm hover:bg-blue-800 transition">Save Changes</button>`:''}
        ${can('admin')?`<button data-act="delete-integ" data-cid="${c.id}" data-iid="${i.id}" class="w-full text-red-400 hover:text-red-600 text-xs py-1 transition">Delete Integration</button>`:''}
      </div>
    </div>
    <div class="bg-white rounded-2xl border border-gray-100 p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-semibold text-gray-900 text-sm">Timeline <span class="text-gray-400 font-normal">(${i.timeline?.length||0})</span></h3>
      </div>
      ${can('edit')?`<div class="mb-4">
        <textarea id="tl-input" rows="3" placeholder="What happened? Current status?" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none mb-2"></textarea>
        <button data-act="add-timeline" data-cid="${c.id}" data-iid="${i.id}" class="w-full text-sm font-medium bg-gray-50 hover:bg-blue-50 hover:text-blue-900 text-gray-700 border border-gray-200 rounded-xl py-2 transition">+ Add Update</button>
      </div>`:''}
      <div class="space-y-3 max-h-[440px] overflow-y-auto pr-1">
        ${!(i.timeline?.length)?`<p class="text-sm text-gray-400 text-center py-8">No updates yet</p>`:
        i.timeline.map((t,idx,arr)=>`<div class="relative pl-5 ${idx<arr.length-1?'pb-3 border-l-2 border-gray-100':''}">
          <div class="absolute -left-[5px] top-1 w-2.5 h-2.5 bg-blue-600 rounded-full border-2 border-white ring-1 ring-blue-200"></div>
          <div class="text-xs font-semibold text-blue-700 mb-1">${esc(t.date)} · ${esc(t.addedBy||'')}</div>
          <p class="text-sm text-gray-700 leading-relaxed">${esc(t.update)}</p>
          ${t.addedAt?`<div class="text-xs text-gray-400 mt-1">${fmtDate(t.addedAt)}</div>`:''}
        </div>`).join('')}
      </div>
    </div>
  </div>
</div>`;
}

// ─── ADMIN ────────────────────────────────────────────────────────
function renderAdmin(){
  return`<div class="max-w-7xl mx-auto px-4 py-6 fade">
  <h1 class="text-xl font-bold text-gray-900 mb-5">Admin</h1>
  <div class="flex border-b border-gray-200 mb-6 gap-1">

    const u=document.getElementById('lu')?.value.trim(),p=document.getElementById('lp')?.value;
    const errEl=document.getElementById('lerr');
    if(!u||!p){if(errEl){errEl.textContent='Enter username and password';errEl.classList.remove('hidden');}return;}
    const hash=await sha256(p);
    let ld;
    try{
      const lr=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,passwordHash:hash})});
      ld=await lr.json();
      if(!lr.ok){const e2=document.getElementById('lerr');if(e2){e2.textContent=ld.error||'Login failed';e2.classList.remove('hidden');}return;}
    }catch(err){const e2=document.getElementById('lerr');if(e2){e2.textContent='Connection failed. Check repo/env setup.';e2.classList.remove('hidden');}return;}
    S.sessionToken=ld.token;S.user=ld.user;S.shas.users=ld.usersSha;
    try{const cl=await apiRead('data/clients.json');S.clients=cl.content;S.shas.clients=cl.sha;}
    catch(err){const e2=document.getElementById('lerr');if(e2){e2.textContent='Loaded user but failed to load clients.';e2.classList.remove('hidden');}return;}
    navigate('clients');return;
  }
  if(act==='logout'){S.user=null;S.clients=[];S.users=[];S.shas={clients:null,users:null};navigate('login');return;}
  if(act==='nav-clients'){navigate('clients');return;}
  if(act==='nav-admin'){if(can('admin'))navigate('admin');return;}
  if(act==='open-client'){navigate('client-detail',{clientId:el.dataset.id});return;}
  if(act==='open-integ'){navigate('integ-detail',{clientId:el.dataset.cid,integId:el.dataset.iid});return;}
  if(act==='filter'){S.filter=el.dataset.filter;render();return;}
  if(act==='admin-tab'){S.adminTab=el.dataset.tab;render();return;}
  if(act==='exp-pptx'){await exportPptx(el.dataset.id);return;}
  if(act==='exp-pdf'){exportPdf(el.dataset.id);return;}
  if(act==='modal-open'){S.modal={type:el.dataset.modal,cid:el.dataset.cid};render();setTimeout(()=>document.getElementById('m1')?.focus(),50);return;}
  if(act==='modal-close'){S.modal=null;render();return;}

  if(act==='save-integ'){
    if(!can('edit'))return;
    const cid=el.dataset.cid,iid=el.dataset.iid;
    const c=S.clients.find(x=>x.id===cid);const i=c?.integrations.find(x=>x.id===iid);if(!i)return;
    const prev={...i};
    i.status=document.getElementById('f-status')?.value||i.status;
    i.assignee=document.getElementById('f-assignee')?.value?.trim()||i.assignee;
    i.dueDate=document.getElementById('f-due')?.value||'';
    i.description=document.getElementById('f-desc')?.value?.trim()||'';
    i.nextAction=document.getElementById('f-next')?.value?.trim()||'';
    el.textContent='Saving…';el.disabled=true;
    try{await saveClients(`Update ${i.name}`);showToast('Saved ✓');navigate('integ-detail',{clientId:cid,integId:iid});}
    catch(err){Object.assign(i,prev);showToast('Save failed: '+err.message,'error');el.textContent='Save Changes';el.disabled=false;}
    return;
  }
  if(act==='add-timeline'){
    if(!can('edit'))return;
    const cid=el.dataset.cid,iid=el.dataset.iid;
    const text=document.getElementById('tl-input')?.value.trim();
    if(!text){showToast('Enter an update','error');return;}
    const c=S.clients.find(x=>x.id===cid);const i=c?.integrations.find(x=>x.id===iid);if(!i)return;
    const entry={id:uid(),date:new Date().toISOString().slice(0,10),update:text,addedBy:S.user.name,addedAt:new Date().toISOString()};
    i.timeline.unshift(entry);el.textContent='Saving…';el.disabled=true;
    try{await saveClients(`Timeline: ${i.name}`);showToast('Update added ✓');navigate('integ-detail',{clientId:cid,integId:iid});}
    catch(err){i.timeline.shift();showToast('Failed: '+err.message,'error');el.textContent='+ Add Update';el.disabled=false;}
    return;
  }
  if(act==='delete-client'){
    if(!can('admin'))return;const c=S.clients.find(x=>x.id===el.dataset.id);if(!c)return;
    S.modal={type:'confirm',msg:`Delete "${c.name}" and all ${c.integrations.length} integrations? Cannot be undone.`,_act:'delete-client',_id:c.id};render();return;
  }
  if(act==='delete-integ'){
    if(!can('admin'))return;const c=S.clients.find(x=>x.id===el.dataset.cid);const i=c?.integrations.find(x=>x.id===el.dataset.iid);if(!i)return;
    S.modal={type:'confirm',msg:`Delete "${i.name}"? Cannot be undone.`,_act:'delete-integ',_cid:c.id,_iid:i.id};render();return;
  }
  if(act==='delete-user'){
    if(!can('admin'))return;const u=S.users.find(x=>x.id===el.dataset.uid);if(!u||u.id===S.user?.id)return;
    S.modal={type:'confirm',msg:`Delete user "${u.name}" (${u.username})?`,_act:'delete-user',_uid:u.id};render();return;
  }
  if(act==='modal-confirm'){
    const m=S.modal;if(!m)return;
    if(m.type==='confirm'){
      S.modal=null;render();
      if(m._act==='delete-client'){const idx=S.clients.findIndex(x=>x.id===m._id);if(idx<0)return;const[rem]=S.clients.splice(idx,1);try{await saveClients(`Delete ${rem.name}`);showToast(`${rem.name} deleted`);navigate('clients');}catch(err){S.clients.splice(idx,0,rem);showToast('Failed: '+err.message,'error');render();}}
      else if(m._act==='delete-integ'){const c=S.clients.find(x=>x.id===m._cid);if(!c)return;const idx=c.integrations.findIndex(x=>x.id===m._iid);if(idx<0)return;const[rem]=c.integrations.splice(idx,1);try{await saveClients(`Delete ${rem.name}`);showToast(`${rem.name} deleted`);navigate('client-detail',{clientId:m._cid});}catch(err){c.integrations.splice(idx,0,rem);showToast('Failed: '+err.message,'error');render();}}
      else if(m._act==='delete-user'){const idx=S.users.findIndex(x=>x.id===m._uid);if(idx<0)return;const[rem]=S.users.splice(idx,1);try{await saveUsers(`Delete ${rem.username}`);showToast(`${rem.name} removed`);render();}catch(err){S.users.splice(idx,0,rem);showToast('Failed: '+err.message,'error');render();}}
    } else if(m.type==='add-client'){
      const name=document.getElementById('m1')?.value.trim(),desc=document.getElementById('m2')?.value.trim();
      if(!name){showToast('Name required','error');return;}
      const nc={id:uid(),name,description:desc||'',createdAt:new Date().toISOString(),integrations:[]};S.clients.push(nc);S.modal=null;render();
      try{await saveClients(`Add ${name}`);showToast(`${name} added`);}catch(err){S.clients.pop();showToast('Failed: '+err.message,'error');render();}
    } else if(m.type==='add-integ'){
      const cid=document.getElementById('m0')?.value,name=document.getElementById('m1')?.value.trim();
      if(!name){showToast('Name required','error');return;}
      const c=S.clients.find(x=>x.id===cid);if(!c)return;
      const ni={id:uid(),name,status:document.getElementById('m2')?.value||'Not Started',assignee:document.getElementById('m3')?.value.trim()||'',dueDate:document.getElementById('m4')?.value||'',description:document.getElementById('m5')?.value.trim()||'',nextAction:'',timeline:[]};
      c.integrations.push(ni);S.modal=null;render();
      try{await saveClients(`Add ${name} to ${c.name}`);showToast(`${name} added`);}catch(err){c.integrations.pop();showToast('Failed: '+err.message,'error');render();}
    } else if(m.type==='add-user'){
      const username=document.getElementById('m1')?.value.trim(),name=document.getElementById('m2')?.value.trim(),password=document.getElementById('m3')?.value,role=document.getElementById('m4')?.value;
      if(!username||!name||!password){showToast('All fields required','error');return;}
      if(S.users.find(x=>x.username===username)){showToast('Username taken','error');return;}
      const hash=await sha256(password);
      const nu={id:uid(),username,name,passwordHash:hash,role};S.users.push(nu);S.modal=null;render();
      try{await saveUsers(`Add ${username}`);showToast(`${name} added`);}catch(err){S.users.pop();showToast('Failed: '+err.message,'error');render();}
    }
  }
});

document.addEventListener('change',async e=>{
  const el=e.target.closest('[data-act="change-role"]');if(!el||!can('admin'))return;
  const u=S.users.find(x=>x.id===el.dataset.uid);if(!u||u.id===S.user?.id)return;
  const prev=u.role;u.role=el.value;
  try{await saveUsers(`Role: ${u.username}`);showToast(`${u.name} → ${u.role}`);}
  catch(err){u.role=prev;showToast('Failed','error');render();}
});

let _st;
document.addEventListener('input',e=>{
  if(e.target.dataset?.act==='search'){
    clearTimeout(_st);const v=e.target.value;
    _st=setTimeout(()=>{S.search=v;render();setTimeout(()=>{const el=document.getElementById('search-inp');if(el){el.focus();try{el.setSelectionRange(v.length,v.length);}catch{}}},10);},120);
  }
});

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&S.view==='login')document.querySelector('[data-act="login"]')?.click();
  if(e.key==='Escape'&&S.modal){S.modal=null;render();}
});

// ─── INIT ─────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
